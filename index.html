<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTSC Flashcards — Terminologie FR/EN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0efe9;--surface:#fff;--surface2:#f7f6f2;
  --text:#1a1a18;--text2:#6b6a64;--text3:#9c9a92;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#993C1D;--red-light:#FAECE7;
  --radius:14px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#26261f;--surface2:#2e2e26;
    --text:#e8e6dc;--text2:#9c9a92;--text3:#6b6a64;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --green-light:#04342C;--purple-light:#26215C;
    --amber-light:#412402;--red-light:#4A1B0C;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HERO */
.hero{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 60%,#085041 100%);color:#fff;padding:2rem 1.5rem 1.5rem;text-align:center}
.hero h1{font-size:clamp(20px,4vw,28px);font-weight:600;margin-bottom:.4rem}
.hero p{font-size:14px;opacity:.85;max-width:480px;margin:0 auto}

/* CONTROLS */
.controls{max-width:820px;margin:1.5rem auto;padding:0 1rem;display:flex;flex-direction:column;gap:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.chip.active{color:#fff;border-color:transparent;font-weight:500}
.chip.c-all.active{background:#444}
.chip.c-exam.active{background:var(--amber);color:#fff}
select{font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;flex:1;min-width:180px;max-width:360px}
.stats-bar{font-size:13px;color:var(--text2);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.stats-bar strong{color:var(--text)}

/* PROGRESS */
.progress-wrap{max-width:820px;margin:0 auto;padding:0 1rem}
.progress-track{height:5px;background:var(--border);border-radius:3px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}

/* CARD AREA */
.card-area{max-width:820px;margin:1.5rem auto 2rem;padding:0 1rem;display:flex;flex-direction:column;align-items:center;gap:16px}

/* FLASHCARD */
.flashcard-wrap{width:100%;perspective:1200px;cursor:pointer}
.flashcard{position:relative;width:100%;min-height:280px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;min-height:280px;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2rem;display:flex;flex-direction:column;justify-content:space-between}
.face.back{transform:rotateY(180deg);background:var(--surface2)}
.face-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;opacity:.5;margin-bottom:.75rem}
.term-text{font-size:clamp(22px,4vw,32px);font-weight:600;line-height:1.25;flex:1;display:flex;align-items:center}
.def-text{font-size:14px;line-height:1.7;color:var(--text);flex:1}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem;padding-top:.75rem;border-top:0.5px solid var(--border)}
.badge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.badge.exam{background:var(--amber-light);color:var(--amber)}
.badge.module{background:var(--green-light);color:var(--green-dark);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flip-hint{font-size:12px;color:var(--text3);margin-top:.5rem;text-align:center}

/* LANG TOGGLE on back face */
.lang-toggle{display:flex;gap:6px;margin-bottom:1rem}
.lang-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .12s}
.lang-btn.active{background:var(--green);color:#fff;border-color:transparent}

/* NAV */
.nav{display:flex;gap:12px;align-items:center;width:100%}
.nav-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--surface2)}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
.nav-count{font-size:13px;font-weight:500;color:var(--text)}
.nav-total{font-size:11px;color:var(--text3)}

/* SHUFFLE */
.shuffle-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.shuffle-btn:hover{background:var(--surface2)}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}

@media(max-width:500px){
  .face{padding:1.25rem}
  .term-text{font-size:22px}
  .nav-btn{padding:10px 8px;font-size:13px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>CTSC Flashcards — Terminologie FR / EN</h1>
  <p>292 termes · Cliquer pour révéler · Filtrer par module ou examen · Révision hybride FR/EN</p>
</div>

<div class="controls">
  <div class="filter-row">
    <span class="filter-label">Filtre :</span>
    <button class="chip c-all active" onclick="setFilter('all')">Tous (292)</button>
    <button class="chip c-exam" onclick="setFilter('exam')">★ Examen seulement</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Module :</span>
    <select id="moduleSelect" onchange="setModule(this.value)">
      <option value="">— Tous les modules —</option>
    </select>
  </div>
  <div class="stats-bar">
    <span id="statsText">Chargement...</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
</div>

<div class="card-area" id="cardArea">
  <div class="empty">Chargement des cartes...</div>
</div>

<script>
const ALL_CARDS = [{"term": "Agility", "fr": "La capacité à s’adapter et à réagir aux changements de l’environnement commercial. Il s'agit d'un attribut de performance axé sur le client de la Supply Chain Operations Reference (SCOR) qui décrit la capacité à répondre aux influences, perturbations et événements externes imprévus. L'agilité de la Supply chain dans la norme numérique SCOR inclut l'agilité dans les domaines des commandes, de l'approvisionnement, de la transformation, de la livraison client et du retour.", "en": "The ability to adapt and respond quickly to changes in the business environment. A customer-focused supply chain performance attribute describing capacity to respond to unexpected external influences and events.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Strategy and Transformation"}, {"term": "Resilience", "fr": "Dans la chaîne d’approvisionnement, la capacité à revenir à une position d’équilibre après avoir connu un événement qui entraîne un écart entre les résultats opérationnels et les attentes. La résilience peut être améliorée en augmentant le nombre d’options de réponse et/ou en diminuant le temps d’exécution de ces options. La résilience est améliorée par la surveillance et le contrôle des risques.", "en": "In supply chain, the capacity to return to a position of equilibrium after experiencing an event that causes a deviation between operational results and expectations. Improved by increasing response options and decreasing response lead times.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Strategy and Transformation"}, {"term": "Sustainability", "fr": "Une concentration organisationnelle sur des activités qui procurent des avantages présents sans compromettre les besoins des générations futures.", "en": "An organizational focus on activities that provide present benefits without compromising the needs of future generations, balancing economic, environmental, and social considerations.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Strategy and Transformation"}, {"term": "Supply Chain Operations Reference (SCOR) model", "fr": "Un modèle de référence de processus développé par le Supply Chain Council et approuvé par l'Association for Supply Chain Management (ASCM) comme outil de diagnostic intersectoriel standard pour la gestion de la supply chainsupply chain. Le modèle SCOR décrit les activités commerciales associées à la satisfaction de la demande d'un client, notamment l'orchestration, la planification, l'approvisionnement, la commande, la transformation, l'exécution et le retour.", "en": "A cross-industry diagnostic tool for supply chain management developed by the Supply Chain Council and endorsed by ASCM. Describes business activities for satisfying customer demand including orchestrate, plan, source, order, transform, fulfill, and return.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Strategy and Transformation"}, {"term": "Digital Transformation", "fr": "La création de nouveaux processus commerciaux ou l’amélioration des processus commerciaux existants grâce à l’adoption de technologies numériques pour améliorer la coordination interne et externe des opérations et pour offrir une valeur accrue au client.", "en": "The creation of new or improvement of existing business processes through the adoption of digital technologies to enhance internal and external coordination of operations and deliver increased customer value.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Digital Transformation and Innovation"}, {"term": "Artificial intelligence (AI)", "fr": "Programmes informatiques capables d’apprendre et de raisonner de manière similaire aux humains. Le problème est défini en termes d’états et d’opérateurs pour générer un espace de recherche qui est examiné pour la meilleure solution. En revanche, la programmation conventionnelle collecte et traite les données par algorithme ou par des procédures fixes étape par étape. 2) Un domaine de l’informatique qui tente de développer des programmes informatiques d’IA.", "en": "The simulation of human intelligence processes by computer systems, including learning, reasoning, and self-correction. In supply chain, AI enables demand forecasting, anomaly detection, autonomous planning, and intelligent decision support.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Digital Transformation and Innovation"}, {"term": "Supply chain risk management (SCRM)", "fr": "L'identification, l'évaluation et l'atténuation systématiques des perturbations potentielles de la supply chain dans le but de réduire leurs impacts négatifs sur les performances de la supply chain.", "en": "The implementation of strategies to manage everyday and exceptional risks along the supply chain based on continuous risk assessment with the objective of reducing vulnerability and ensuring continuity.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Risk Management"}, {"term": "Risk Acceptance", "fr": "Décision de ne prendre aucune mesure pour faire face à un risque ou incapacité à élaborer un plan pour faire face au risque.", "en": "A risk response strategy in which the organization acknowledges the existence of a risk and decides to tolerate it without taking proactive action, often when the cost of mitigation exceeds the potential impact.", "exam": false, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Risk Management"}, {"term": "Key performance indicator (KPI)", "fr": "Une mesure financière ou non financière utilisée pour définir et évaluer les progrès dans la réalisation d’objectifs organisationnels spécifiques et qui est généralement liée à la stratégie d'une organisation et aux parties prenantes de l’entreprise. 2) Une mesure utilisée pour mesurer la performance globale ou l’état des lieux. Les indicateurs de niveau 1 du Supply Chain Operations Reference (SCOR) sont considérés comme des KPI.", "en": "A quantifiable measure used to evaluate the success of an organization, employee, or process in achieving performance objectives. KPIs are aligned with strategic goals and tracked over time.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Excellence and Performance"}, {"term": "Balanced Scorecard", "fr": "Liste de mesures financières et opérationnelles utilisées pour évaluer la performance d’une organisation ou d’une Supply chain. Les dimensions du tableau de bord prospectif peuvent inclure la perspective du client, la perspective du processus d’entreprise, la perspective financière et les perspectives d’innovation et d’apprentissage.", "en": "A strategic management tool developed by Kaplan and Norton that translates vision and strategy into a balanced set of performance measures across four perspectives: financial, customer, internal processes, and learning and growth.", "exam": true, "module": "Supply Chain Transformation Management", "topic": "Supply Chain Excellence and Performance"}, {"term": "Demand", "fr": "Besoin pour un produit ou un composant particulier.", "en": "A need for a particular product or component. Demand may come from customers (independent demand) or from within the organization as input to a manufacturing process (dependent demand).", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Planning Demand"}, {"term": "Demand management", "fr": "La fonction de reconnaissance de toutes les demandes de biens et de services pour soutenir le marché.", "en": "The function of recognizing all demands for goods and services to support the marketplace, including forecasting, customer order management, demand influencing, and demand prioritization.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Planning Demand"}, {"term": "Order processing", "fr": "L'activité requise pour traiter administrativement la commande d'un client et la préparer pour l'expédition ou la production.", "en": "The activities involved in receiving, managing, and fulfilling customer orders, including order entry, credit checking, inventory allocation, picking, packing, and shipment.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Communicating Demand"}, {"term": "Plan-do-check-action (PDCA) model", "fr": "Un processus en quatre étapes pour l'amélioration de la qualité.", "en": "A four-step iterative management method used for continuous improvement: Plan (identify and analyze the problem), Do (implement a solution), Check (evaluate results), Act (standardize or adjust the solution).", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Influencing Demand"}, {"term": "Collaborative planning, forecasting, and replenishment (CPFR)", "fr": "Un processus de collaboration par lequel les partenaires commerciaux de la chaîne d'approvisionnement peuvent planifier conjointement les activités clés de la chaîne d'approvisionnement.", "en": "A business practice combining the intelligence of multiple trading partners in planning and fulfilling customer demand. Involves sharing forecasts, sales data, and inventory information to improve supply chain coordination.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Linking Demand Management Components"}, {"term": "Forecasting", "fr": "La fonction commerciale qui tente de prédire les ventes et l'utilisation des produits afin qu'ils puissent être achetés ou fabriqués en quantités appropriées à l'avance.", "en": "The business function that attempts to predict sales and use of products so they can be purchased or manufactured in appropriate quantities in advance. Uses historical data, statistical methods, and market intelligence.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Principles of Forecasting"}, {"term": "Demand planning", "fr": "Processus consistant à combiner des techniques de prévision statistique et le jugement pour construire des estimations de la demande de produits ou de services.", "en": "The process of forecasting demand for products or services in order to ensure they can be delivered to satisfy customers. Incorporates statistical forecasting, market intelligence, and collaborative input.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Principles of Forecasting"}, {"term": "Trend", "fr": "Mouvement général à la hausse ou à la baisse d'une variable dans le temps.", "en": "A general direction in which something is developing or changing over time. In forecasting, a long-term upward or downward movement in demand data used to project future demand patterns.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Factors Affecting Demand"}, {"term": "Seasonality", "fr": "Un modèle répétitif prévisible de la demande mesuré sur une année où la demande croît et décline.", "en": "A repetitive, predictable pattern of demand fluctuation occurring at regular intervals, typically within a 12-month period, driven by seasonal factors such as weather, holidays, or buying cycles.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Factors Affecting Demand"}, {"term": "Forecast error", "fr": "La différence entre la demande réelle et la demande prévue.", "en": "The difference between the actual demand and the forecasted demand for a given period. Measured to evaluate forecast accuracy and guide improvements to forecasting methods.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Measures of Forecast Error"}, {"term": "Bias", "fr": "Un écart systématique par rapport à la moyenne dans une direction (haute ou basse).", "en": "A consistent tendency to forecast either too high or too low over time. Positive bias means forecasts are consistently above actual; negative bias means forecasts are consistently below actual.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Measures of Forecast Error"}, {"term": "Mean absolute deviation (MAD)", "fr": "La moyenne des valeurs absolues des écarts entre les valeurs observées et une valeur attendue.", "en": "A measure of forecast error calculated as the average of the absolute values of the individual forecast errors over a specified time period. Used to assess forecast accuracy.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Measures of Forecast Error"}, {"term": "Time fence", "fr": "Une politique ou une directive établie pour noter où diverses restrictions ou changements dans les procédures d'exploitation ont lieu.", "en": "A policy or guideline established to note where changes may be made to the master schedule. Inside the demand time fence, customer orders take priority; outside the planning time fence, forecasts drive planning.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Time Fences"}, {"term": "Allocation", "fr": "La classification des ressources ou des quantités d'articles qui ont été affectées à des commandes spécifiques mais qui n'ont pas encore été sorties du magasin pour la production.", "en": "The process of reserving inventory for specific customers, orders, or production requirements to ensure availability for committed demand.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Allocation of Supply"}, {"term": "Available-to-promise (ATP)", "fr": "La partie non engagée de l'inventaire d'une entreprise et de la production planifiée maintenue dans le calendrier de référence pour soutenir la promesse de commande client.", "en": "The uncommitted portion of a company's inventory or planned production that can be promised to customers for delivery. Calculated as on-hand plus scheduled receipts minus firm customer orders.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Allocation of Supply"}, {"term": "Sales and operations planning (S&OP)", "fr": "Un processus de développement de plans tactiques qui donne à la direction la capacité de diriger stratégiquement ses activités pour obtenir un avantage concurrentiel.", "en": "A process that provides management the ability to strategically direct its businesses to achieve competitive advantage on a continuous basis by integrating customer-focused marketing plans with the management of the supply chain.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Sales and Operations Planning"}, {"term": "Master production schedule (MPS)", "fr": "Une ligne sur la grille du programme directeur qui reflète le programme de construction anticipé pour les articles affectés au planificateur principal.", "en": "A plan for the production of individual end items specifying the quantity and timing of production. Drives material requirements planning and represents what the company plans to produce in specific configurations, quantities, and dates.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Master Scheduling"}, {"term": "Material requirements planning (MRP)", "fr": "Un ensemble de techniques qui utilise les données de la nomenclature, les données d'inventaire et le programme directeur de production pour calculer les besoins en composants.", "en": "A system for calculating the materials and components needed to manufacture a product. It uses the bill of materials, master production schedule, and inventory records to generate purchasing and production orders.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Materials and Inventory"}, {"term": "Dependent demand", "fr": "Demande qui est directement liée ou dérivée de la structure de la nomenclature pour d'autres articles ou produits finis.", "en": "Demand that is directly related to and derived from the demand for another item. Typically refers to components and subassemblies used in manufacturing a parent item.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Materials and Inventory"}, {"term": "Inventory", "fr": "Stocks ou articles utilisés pour soutenir la production, les activités de soutien et le service à la clientèle.", "en": "Those stocks or items used to support production, supporting activities (maintenance, repair, and operations), and customer service. Includes raw materials, work-in-process, and finished goods.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Inventory Basics"}, {"term": "Work-in-process (WIP)", "fr": "Biens à divers stades d'achèvement dans l'usine.", "en": "Product that has been released for production but has not yet been completed. Represents partially completed goods between the beginning and end of a production process.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Inventory Basics"}, {"term": "Inventory visibility", "fr": "Mesure dans laquelle les informations sur les stocks sont partagées au sein d'une entreprise et avec les partenaires de la chaîne d'approvisionnement.", "en": "The ability to access accurate, real-time information about inventory levels, locations, and movements across the supply chain, enabling better decisions and reducing stockouts or excess inventory.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Inventory Basics"}, {"term": "ABC classification", "fr": "La classification d'un groupe d'articles par ordre décroissant de volume monétaire annuel ou selon d'autres critères.", "en": "The segmentation of inventory items into three categories (A, B, C) based on value or usage. A items represent high-value/high-usage items requiring tight control; C items are low-value/low-usage requiring minimal control.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Aggregate and Item Inventory Management"}, {"term": "Inventory planning", "fr": "Activités et techniques permettant de déterminer les niveaux souhaités d'articles, y compris les quantités de commande et les niveaux de stock de sécurité.", "en": "The process of determining the appropriate inventory levels and policies to balance customer service goals with cost efficiency, including safety stock, reorder points, and order quantities.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Inventory Planning Basics"}, {"term": "Inventory control", "fr": "Activités et techniques de maintien des niveaux de stocks souhaités.", "en": "The activities and techniques of maintaining the desired levels of items, whether raw materials, work in process, or finished products, through stock tracking, cycle counting, and replenishment management.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Inventory Control"}, {"term": "Logistics", "fr": "Le sous-ensemble de la gestion de la chaîne d'approvisionnement qui contrôle le mouvement direct et inverse, la manipulation et le stockage des marchandises.", "en": "The process of planning, implementing, and controlling the efficient, effective flow and storage of goods, services, and related information from the point of origin to the point of consumption.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Introduction to Logistics"}, {"term": "Expedite", "fr": "Précipiter ou relancer des ordres de production ou d'achat qui sont nécessaires dans un délai inférieur au délai normal.", "en": "To prioritize and accelerate the movement of materials, orders, or information through the supply chain to meet urgent demand or recover from delays, often at additional cost.", "exam": false, "module": "Supply Chain Planning and Execution", "topic": "Expediting"}, {"term": "Competitive advantage", "fr": "Avantage concurrentiel : Avantage d'une entreprise sur ses rivaux pour attirer les clients et se défendre contre les concurrents. Les sources de cet avantage comprennent des caractéristiques qu'un concurrent ne peut pas reproduire sans coûts et risques substantiels, comme une technique de fabrication, une marque ou un ensemble de compétences humaines.", "en": "A superiority gained by an organization when it can provide the same value as its competitors but at a lower price, or can charge higher prices by providing greater value through differentiation.", "exam": true, "module": "Strategy", "topic": "Strategy Road Map"}, {"term": "Business Plan", "fr": "Plan d’entreprise : 1) Un énoncé de stratégie à long terme et des objectifs de revenus, de coûts et de profits, généralement accompagné de budgets, d'un bilan prévisionnel et d'un tableau des flux de trésorerie. 2) Un document décrivant une nouvelle entreprise, incluant sa raison d’être, ses secteurs d’activité, ses objectifs et ses besoins financiers.", "en": "A formal document describing an organization's objectives, strategies, financial projections, and the means by which it plans to achieve those goals within a specified time period.", "exam": false, "module": "Strategy", "topic": "Strategy Road Map"}, {"term": "Mission", "fr": "Mission : Objectif global d'une organisation fixé dans les limites de son champ d'activité.", "en": "A short, concise statement of the fundamental purpose of an organization — why it exists, what it does, and for whom it serves. Guides strategic and operational decision-making.", "exam": false, "module": "Strategy", "topic": "Mission, Vision, and Values"}, {"term": "Vision", "fr": "Vision : Perception partagée de l'avenir de l'organisation - ce que l'organisation réalisera et une philosophie de soutien.", "en": "A statement describing where an organization aspires to be in the future. Provides long-term direction and inspiration, guiding strategy formulation and organizational culture.", "exam": false, "module": "Strategy", "topic": "Mission, Vision, and Values"}, {"term": "Environmental scanning", "fr": "Analyse de l'environnement : Processus utilisé pour exposer les forces, faiblesses, opportunités et menaces potentielles d'une organisation.", "en": "The systematic monitoring and analysis of an organization's external environment including political, economic, social, technological, legal, and environmental factors to identify threats and opportunities.", "exam": false, "module": "Strategy", "topic": "Analyzing the External Environment"}, {"term": "SWOT analysis", "fr": "Analyse FFOM (SWOT) : Analyse des forces, faiblesses, opportunités et menaces d'une organisation.", "en": "A strategic planning framework evaluating an organization's internal Strengths and Weaknesses and external Opportunities and Threats to support strategy formulation and decision-making.", "exam": true, "module": "Strategy", "topic": "Analyzing the Internal Environment"}, {"term": "Value chain analysis", "fr": "Analyse de la chaîne de valeur : Examen de tous les maillons qu'une entreprise utilise pour produire et livrer ses produits et services, du point d'origine jusqu'au client final.", "en": "A framework for identifying and analyzing the primary and support activities that create value for customers and competitive advantage, based on Michael Porter's value chain model.", "exam": false, "module": "Strategy", "topic": "Analyzing the Internal Environment"}, {"term": "Product life cycle", "fr": "Cycle de vie du produit : 1) Les étapes qu'un nouveau produit traverse du début à la fin (introduction, croissance, maturité et déclin). 2) Le temps écoulé entre la recherche et le développement initial et le moment où les ventes et le support du produit sont retirés.", "en": "The stages through which a product passes from introduction to market, growth, maturity, and decline. Each stage has distinct characteristics for demand, competition, and marketing strategy.", "exam": true, "module": "Strategy", "topic": "Analyzing the Internal Environment"}, {"term": "Vertical integration", "fr": "Intégration verticale : Degré auquel une entreprise a décidé de produire directement plusieurs étapes à valeur ajoutée, des matières premières à la vente du produit au consommateur final.", "en": "A strategy by which a company expands its control over its supply chain by acquiring or controlling its suppliers (backward integration) or its distributors or customers (forward integration).", "exam": false, "module": "Strategy", "topic": "Vertical and Horizontal Integration"}, {"term": "Outsourcing", "fr": "Externalisation : Processus consistant à faire fournir par des fournisseurs des biens et services qui étaient auparavant fournis en interne.", "en": "The practice of having an external organization perform activities traditionally handled internally. In supply chain, this includes manufacturing, logistics, IT, or customer service operations.", "exam": true, "module": "Strategy", "topic": "Vertical and Horizontal Integration"}, {"term": "SMART", "fr": "Abbréviation pour des objectifs Spécifiques, Mesurables, Atteignables, Réalistes et Temporels (SMART).", "en": "An acronym for criteria used to set effective objectives: Specific, Measurable, Achievable (or Attainable), Relevant, and Time-bound. Ensures goals are clear, trackable, and actionable.", "exam": true, "module": "Strategy", "topic": "Strategic Objectives and Competitive Priorities"}, {"term": "Balanced scorecard", "fr": "Tableau de bord prospectif : Liste de mesures financières et opérationnelles utilisées pour évaluer la performance organisationnelle ou de la chaîne d'approvisionnement selon quatre perspectives : client, processus métier, financier, et innovation/apprentissage.", "en": "A strategic management tool developed by Kaplan and Norton translating vision and strategy into performance measures across four perspectives: financial, customer, internal processes, and learning and growth.", "exam": true, "module": "Strategy", "topic": "Strategic Objectives and Competitive Priorities"}, {"term": "Break-even analysis", "fr": "Analyse du point mort : Étude du nombre d'unités ou du temps nécessaire pour récupérer un investissement.", "en": "A financial tool that determines the point at which total revenue equals total costs, resulting in neither profit nor loss. Used to evaluate the viability of investments or pricing decisions.", "exam": false, "module": "Strategy", "topic": "Analysis for Functional and Operational Strategies"}, {"term": "Assemble-to-order", "fr": "Assemblage à la commande : Environnement de production où un bien ou service peut être assemblé après réception d'une commande client. Les composants clés sont planifiés et stockés en prévision de la commande.", "en": "A production strategy where components and subassemblies are stocked but final assembly is deferred until a customer order is received. Balances customization with short lead times.", "exam": false, "module": "Strategy", "topic": "Push-Pull and the Manufacturing Environment"}, {"term": "Key performance indicator (KPI)", "fr": "Indicateur clé de performance (KPI) : Mesure financière ou non financière utilisée pour définir et évaluer les progrès vers des objectifs organisationnels spécifiques.", "en": "A quantifiable measure used to evaluate the success of an organization, employee, or process in achieving performance objectives. KPIs are aligned with strategic goals and tracked over time.", "exam": true, "module": "Strategy", "topic": "Performance Monitoring and KPIs"}, {"term": "SCOR model", "fr": "Modèle SCOR : Modèle de référence des processus de la chaîne d'approvisionnement (Supply Chain Operations Reference) standard utilisé pour diagnostiquer la gestion de la chaîne d'approvisionnement (planifier, sourcer, fabriquer, livrer, et retourner).", "en": "The Supply Chain Operations Reference model — a cross-industry diagnostic and improvement tool for supply chain management endorsed by ASCM, covering plan, source, make, deliver, return, and enable processes.", "exam": false, "module": "Strategy", "topic": "Performance Monitoring and KPIs"}, {"term": "Risk mitigation", "fr": "Atténuation des risques : Réduction de l'exposition au risque en termes de probabilité ou d'impact.", "en": "Strategies and actions taken to reduce the probability or impact of identified supply chain risks, including diversification of suppliers, safety stock, contingency planning, and insurance.", "exam": true, "module": "Strategy", "topic": "Risk Management"}, {"term": "Total productive maintenance (TPM)", "fr": "Maintenance productive totale (TPM) : Maintenance préventive combinée à des efforts continus pour adapter et affiner l'équipement afin d'augmenter la flexibilité et de promouvoir les flux continus, avec l'implication des opérateurs.", "en": "A system of maintaining and improving the integrity of production and quality systems through machines, equipment, processes, and employees who add business value to the organization.", "exam": false, "module": "Strategy", "topic": "Capital Equipment and Facilities"}, {"term": "Triple bottom line", "fr": "Triple bilan : Approche qui mesure l'impact économique, social et environnemental des activités d'une organisation dans le but de créer de la valeur pour ses actionnaires et la société.", "en": "A sustainability framework measuring organizational performance across three dimensions: economic (profit), social (people), and environmental (planet). Also known as TBL or 3BL.", "exam": true, "module": "Strategy", "topic": "Sustainability Strategies"}, {"term": "Environmental scanning", "fr": "Analyse de l'environnement", "en": "The systematic monitoring and analysis of an organization's external environment including political, economic, social, technological, legal, and environmental factors to identify threats and opportunities.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "Macro environment", "fr": "Macro-environnement", "en": "The external environmental factors beyond the control of an organization that influence its operations and strategy, including political, economic, social, technological, legal, and environmental (PESTLE) factors.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "Inflation", "fr": "Inflation", "en": "A sustained increase in the general price level of goods and services, reducing purchasing power. In supply chain, inflation increases procurement costs, affects inventory valuation, and influences pricing strategies.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "Deflation", "fr": "Déflation", "en": "A sustained decrease in the general price level of goods and services. Can indicate reduced demand, overcapacity, or technological disruption, and affects supply chain pricing and inventory strategies.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "Competitive analysis", "fr": "Analyse de la concurrence", "en": "The systematic evaluation of competitors' strengths, weaknesses, strategies, and market positions to identify opportunities and threats and to develop strategies for competitive advantage.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "PESTLE analysis", "fr": "Analyse PESTEL", "en": "A strategic framework analyzing the Political, Economic, Social, Technological, Legal, and Environmental factors affecting an organization's external business environment and supply chain strategy.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Supply Chain Transformation Drivers"}, {"term": "Industry 4.0", "fr": "Industrie 4.0", "en": "The fourth industrial revolution characterized by the integration of digital technologies into manufacturing and supply chain, including IoT, AI, robotics, cloud computing, and cyber-physical systems.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Strategic Imperatives"}, {"term": "Voice of the customer (VOC)", "fr": "Voix du client", "en": "A research process used to capture customers' requirements, expectations, preferences, and aversions, translated into measurable product and service attributes to guide design and improvement.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Strategic Imperatives"}, {"term": "Quality function deployment (QFD)", "fr": "Déploiement de la fonction qualité", "en": "A structured methodology and tool for translating customer requirements (voice of the customer) into technical specifications and design requirements at each stage of product development.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Strategic Imperatives"}, {"term": "Process capability index", "fr": "Indice de capacité du processus", "en": "A statistical measure of a process's ability to consistently produce output within specified tolerance limits. Common indices include Cp and Cpk.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Strategic Imperatives"}, {"term": "Big data", "fr": "Mégadonnées", "en": "Extremely large and complex datasets from diverse sources, characterized by high volume, velocity, and variety, that require advanced analytics tools to extract business insights and support decision-making.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Internet of things (IOT)", "fr": "Internet des objets", "en": "A network of physical devices, vehicles, and other objects embedded with sensors, software, and connectivity to collect and exchange data, enabling real-time visibility and automation in supply chains.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Decision support system (DSS)", "fr": "Système d'aide à la décision", "en": "An interactive information system that supports managerial decision-making by combining data, analytical models, and user-friendly interfaces to analyze business scenarios.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Artificial intelligence (AI)", "fr": "Intelligence artificielle", "en": "The simulation of human intelligence processes by computer systems, including learning, reasoning, and self-correction. In supply chain, AI enables demand forecasting, anomaly detection, autonomous planning, and intelligent decision support.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Machine learning", "fr": "Apprentissage automatique", "en": "A subset of artificial intelligence in which algorithms learn from data to make predictions or decisions without being explicitly programmed, enabling continuous improvement in forecasting and optimization.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Data mining", "fr": "Forage de données", "en": "The process of discovering patterns, correlations, anomalies, and useful insights from large datasets using statistical, mathematical, and computational techniques.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Cloud computing", "fr": "Informatique en nuage", "en": "The delivery of computing services — including storage, processing power, software, and analytics — over the internet, enabling scalable, flexible, and cost-efficient IT infrastructure for supply chain operations.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Blockchain", "fr": "Chaîne de blocs", "en": "A distributed digital ledger technology in which transactions are recorded in a secure, transparent, and immutable chain of blocks. Used in supply chain for traceability, provenance tracking, and smart contracts.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Smart contract", "fr": "Contrat intelligent", "en": "A self-executing digital agreement with terms directly written into code, automatically enforcing contract conditions when predefined triggers are met, without requiring intermediaries.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Digitalization and Data Management Technology"}, {"term": "Enterprise resource planning (ERP)", "fr": "Progiciel de gestion intégré", "en": "An integrated software system that centralizes and automates core business processes including finance, HR, production, supply chain, and inventory, providing real-time visibility across the organization.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Advanced planning and scheduling (APS)", "fr": "Planification et ordonnancement avancés", "en": "A system using optimization algorithms and constraint-based logic to simultaneously plan and schedule production, procurement, and distribution, considering capacity and material constraints.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Manufacturing execution systems (MES)", "fr": "Système d'exécution de la fabrication", "en": "A computerized system for managing and monitoring work in process on a manufacturing floor, providing real-time information to optimize production from order launch to finished goods.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Warehouse management system (WMS)", "fr": "Système de gestion d'entrepôt", "en": "A software application designed to support and optimize warehouse functionality including receiving, putaway, picking, packing, shipping, and inventory tracking.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Supply chain event management (SCEM)", "fr": "Gestion des événements de la chaîne logistique", "en": "A software tool enabling companies to flag and respond to exceptions and disruptions in supply chain operations in real time, alerting relevant stakeholders to deviations from plans.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Master data", "fr": "Données de base", "en": "The consistent and uniform set of identifiers and extended attributes describing the core entities of the enterprise — customers, products, suppliers, locations — that form the foundation for business transactions and analytics.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Identify Common Misalignments"}, {"term": "Gap", "fr": "Écart", "en": "The difference between current state performance or capability and a desired future state. Gaps identified in supply chain assessments indicate areas requiring transformation investment.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Perform Gap Assessments"}, {"term": "Gap analysis", "fr": "Analyse d'écarts", "en": "The process of comparing current state performance or capabilities against desired future state benchmarks to identify specific areas for improvement or investment.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Perform Gap Assessments"}, {"term": "What-if analysis", "fr": "Analyse de simulation", "en": "A simulation technique used to evaluate the potential impact of different scenarios or decisions on supply chain performance by changing input variables and observing outcomes.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Create To-Be Models, Simulations, and Capability Sets"}, {"term": "Gantt chart", "fr": "Diagramme de Gantt", "en": "A horizontal bar chart displaying a project schedule showing the start dates, durations, and end dates of tasks and milestones, used for project planning and progress tracking.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Establish and Align Portfolio Governance and Draft Execution Plans"}, {"term": "Master production schedule (MPS)", "fr": "Le programme de fabrication, également appelé calendrier de fabrication.", "en": "A plan for the production of individual end items specifying the quantity and timing of production. Drives material requirements planning and represents what the company plans to produce in specific configurations, quantities, and dates.", "exam": true, "module": "Supply", "topic": "Master Scheduling Road Map"}, {"term": "Rough-cut capacity planning (RCCP)", "fr": "C’est la validation que les ressources critiques ou goulots d’étranglement ont une capacité suffisante pour le programme directeur de production (MPS).", "en": "A process for checking the feasibility of the master production schedule against key resource capacities before the MRP process runs, using a simplified capacity model.", "exam": true, "module": "Supply", "topic": "Master Scheduling Road Map"}, {"term": "Final assembly schedule (FAS)", "fr": "Calendrier de produits finis pour terminer le produit pour des commandes clients spécifiques dans un environnement de fabrication à la commande ou d'assemblage à la commande.", "en": "A schedule of end items to be assembled that authorizes the assembly department to assemble products. Used in assemble-to-order environments where final assembly is customer-triggered.", "exam": false, "module": "Supply", "topic": "Master Scheduling Concepts"}, {"term": "Capacity management", "fr": "La fonction consistant à établir, mesurer, surveiller et ajuster les limites ou les niveaux de capacité afin d’exécuter tous les calendriers de fabrication.", "en": "The function of establishing, measuring, monitoring, and adjusting limits or levels of capacity in order to execute all manufacturing schedules.", "exam": false, "module": "Supply", "topic": "Master Scheduling Concepts"}, {"term": "Materials management", "fr": "Le regroupement des fonctions de gestion soutenant le cycle complet du flux de matières, de l'achat et du contrôle interne des matières de production à l'expédition et à la distribution du produit fini.", "en": "The grouping of management functions supporting the complete cycle of material flow from purchase and internal control of materials to planning, forecasting, dispatching, and shipping.", "exam": false, "module": "Supply", "topic": "Master Scheduling Concepts"}, {"term": "Cycle stock", "fr": "L’un des deux principaux composants conceptuels de tout inventaire d’articles, le stock de cycle est le composant le plus actif.", "en": "The portion of inventory that results from the replenishment process, representing the average inventory on hand between replenishment orders. Also called lot-size inventory or base stock.", "exam": false, "module": "Supply", "topic": "Creating the MPS"}, {"term": "Pegging", "fr": "Dans le MRP et le MPS, la capacité d’identifier pour un article donné les sources de ses besoins bruts et/ou allocations.", "en": "The ability to trace the demand linkage from a requirement back to its sources, connecting net requirements to their parent demand. Used in MRP for traceability and exception management.", "exam": false, "module": "Supply", "topic": "Creating the MPS"}, {"term": "Common parts bill of material", "fr": "Type de nomenclature de planification qui regroupe les composants communs d’un produit ou d’une famille de produits dans une nomenclature unique.", "en": "A bill of material coding and structuring technique that identifies all common components across multiple product families, facilitating planning and procurement efficiency.", "exam": false, "module": "Supply", "topic": "ATO Products and Planning Bills"}, {"term": "Modular bill of material", "fr": "Type de nomenclature de planification organisée en modules ou options de produits.", "en": "A method for creating bills of material based on product modules or options that can be combined in various ways, supporting configure-to-order and assemble-to-order environments.", "exam": false, "module": "Supply", "topic": "ATO Products and Planning Bills"}, {"term": "Super bill of material", "fr": "Type de nomenclature de planification, située au niveau supérieur de la structure, qui relie diverses nomenclatures modulaires pour définir un produit entier ou une famille de produits.", "en": "A bill of material containing options and common parts for a product family, used in master scheduling to plan at the family level using historical option percentages.", "exam": false, "module": "Supply", "topic": "ATO Products and Planning Bills"}, {"term": "Demand time fence (DTF)", "fr": "Point dans le temps à l'intérieur duquel les prévisions ne sont plus incluses dans la demande totale et les calculs de stock disponible projeté.", "en": "The boundary within which the master scheduler must not change the master schedule without management approval. Within this fence, customer orders consume forecast.", "exam": false, "module": "Supply", "topic": "Using the Master Schedule"}, {"term": "Planning time fence (PTF)", "fr": "Point dans le temps indiqué dans l’horizon de planification du processus de programme directeur qui marque une limite à l’intérieur de laquelle les changements peuvent nuire aux calendriers des composants.", "en": "The boundary in the master schedule beyond which the planning system may automatically adjust planned orders. Changes inside the PTF require manual authorization.", "exam": false, "module": "Supply", "topic": "Using the Master Schedule"}, {"term": "Volume hedge", "fr": "Quantité planifiée pour protéger contre l'incertitude de la demande ou de l'offre au niveau du programme directeur ou du plan de production.", "en": "Safety stock held to protect against unexpected demand volume increases, particularly for high-value items with long lead times where supply flexibility is limited.", "exam": false, "module": "Supply", "topic": "Maintaining the Master Schedule"}, {"term": "Bill of resources", "fr": "Une liste de la capacité requise et des ressources clés nécessaires pour fabriquer une unité d’un article ou d’une famille sélectionnée.", "en": "A listing of the key resources required to produce one unit of a selected item, used in rough-cut capacity planning to check resource availability against the master schedule.", "exam": false, "module": "Supply", "topic": "RCCP"}, {"term": "Material requirements planning (MRP)", "fr": "Ensemble de techniques utilisant les données de nomenclature, d'inventaire et de programme directeur de production pour calculer les besoins en composants.", "en": "A system for calculating the materials and components needed to manufacture a product. It uses the bill of materials, master production schedule, and inventory records to generate purchasing and production orders.", "exam": true, "module": "Supply", "topic": "MRP Road Map"}, {"term": "Phantom bill of material", "fr": "Technique de codage et de structure de nomenclature utilisée principalement pour les sous-ensembles transitoires (non stockés).", "en": "A bill of material for a subassembly that does not exist as a stocked item; it is produced and immediately consumed in the next level of assembly. Used to simplify planning.", "exam": false, "module": "Supply", "topic": "MRP Inputs and Outputs"}, {"term": "Net change processing", "fr": "Méthode de mise à jour du système MRP consistant à ne mettre à jour que les parties affectées par des données nouvelles ou révisées.", "en": "An MRP processing method that only recalculates requirements for items that have experienced a change since the last planning run, rather than regenerating the entire plan.", "exam": false, "module": "Supply", "topic": "MRP Design"}, {"term": "Gateway work center", "fr": "Poste de travail qui effectue la première opération d’une séquence de routage particulière.", "en": "The first work center in a routing that controls the flow of work into the shop floor, often used as a pacing mechanism in production scheduling.", "exam": false, "module": "Supply", "topic": "MRP-Based Scheduling"}, {"term": "Supplier certification", "fr": "Procédures de certification vérifiant qu'un fournisseur exploite, maintient, améliore et documente des procédures efficaces répondant aux exigences du client.", "en": "A status awarded to a supplier that has demonstrated consistent capability to meet quality, delivery, and performance standards, often reducing or eliminating incoming inspection requirements.", "exam": true, "module": "Supply", "topic": "Capable Suppliers"}, {"term": "Third-party logistics (3PL)", "fr": "Arrangement dans lequel un acheteur et un fournisseur font équipe avec un tiers qui fournit des services de livraison de produits.", "en": "A firm that provides multiple logistics services to clients, typically including transportation, warehousing, cross-docking, inventory management, packaging, and freight forwarding.", "exam": true, "module": "Supply", "topic": "Supplier Collaboration"}, {"term": "Value analysis", "fr": "L’utilisation systématique de techniques identifiant une fonction requise, établissant une valeur pour cette fonction et fournissant cette fonction au coût global le plus bas.", "en": "A systematic review of all elements of cost in a product or process to identify and eliminate unnecessary costs while maintaining or improving quality, function, and customer satisfaction.", "exam": false, "module": "Supply", "topic": "Purchasing Design"}, {"term": "Cost variance", "fr": "En comptabilité analytique, la différence entre ce qui a été budgétisé pour une activité et ce qu'elle coûte réellement.", "en": "The difference between the planned or standard cost and the actual cost incurred. A positive variance indicates spending below plan; a negative variance indicates overspending.", "exam": false, "module": "Supply", "topic": "Costing Concepts"}, {"term": "Order qualifiers", "fr": "Critères de qualification", "en": "Characteristics of a product or service that are the minimum requirements needed for a company to be considered as a potential supplier. They qualify a company to compete but do not win orders.", "exam": true, "module": "Supply Chain Design", "topic": "Market Research"}, {"term": "Order winners", "fr": "Critères de gain", "en": "Characteristics of a product or service that cause a customer to choose one supplier over another. They differentiate a company competitively and directly win customer orders.", "exam": true, "module": "Supply Chain Design", "topic": "Market Research"}, {"term": "Order losers", "fr": "Critères de perte", "en": "Characteristics or failures in a product, service, or process that directly cause a customer to take their business to a competitor. The opposite of order winners.", "exam": false, "module": "Supply Chain Design", "topic": "Market Research"}, {"term": "Economic value added (EVA)", "fr": "Valeur économique ajoutée (EVA)", "en": "A financial performance metric representing the value created above the required return of shareholders. Calculated as net operating profit after tax minus the cost of capital employed.", "exam": true, "module": "Supply Chain Design", "topic": "Financial Modeling"}, {"term": "Supply chain design", "fr": "Conception de la chaîne logistique", "en": "The process of analyzing and configuring the physical and organizational structure of the supply chain network, including facilities, transportation, inventory, and information flows.", "exam": true, "module": "Supply Chain Design", "topic": "Supply Chain Design and Configuration"}, {"term": "Sourcing", "fr": "Sourcing", "en": "The process of identifying, evaluating, and engaging suppliers for goods and services. Includes supplier selection, negotiation, contracting, and supplier relationship management.", "exam": false, "module": "Supply Chain Design", "topic": "Supply Chain Design and Configuration"}, {"term": "Information system architecture", "fr": "Architecture du système d'information", "en": "The design and structure of an organization's information systems, defining how data, applications, and technology components interact to support business processes and decision-making.", "exam": false, "module": "Supply Chain Design", "topic": "Supply Chain Design and Configuration"}, {"term": "Level of service", "fr": "Niveau de service", "en": "A measure of the degree to which customer orders are filled and delivered in accordance with requirements, including on-time delivery, fill rate, and order accuracy.", "exam": false, "module": "Supply Chain Design", "topic": "Fulfillment Strategies Considering Market Requirements"}, {"term": "Supply chain resilience", "fr": "Résilience de la chaîne logistique", "en": "The adaptive capability of the supply chain to prepare for unexpected events, respond to disruptions, and recover to its original state or a more desirable state afterwards.", "exam": true, "module": "Supply Chain Design", "topic": "Fulfillment Strategies Considering Market Requirements"}, {"term": "Design for the supply chain", "fr": "Conception pour la chaîne logistique", "en": "A design philosophy that considers supply chain factors — sourcing, manufacturing, distribution, and end-of-life — during the product and process design phase to optimize total cost and performance.", "exam": false, "module": "Supply Chain Design", "topic": "Broad-based Design Methods"}, {"term": "Design for X (DFX)", "fr": "Conception pour X (DFX)", "en": "A family of design methodologies where X represents a specific design objective such as manufacturability, assembly, reliability, quality, cost, or sustainability.", "exam": false, "module": "Supply Chain Design", "topic": "Broad-based Design Methods"}, {"term": "Standardization", "fr": "Normalisation", "en": "The process of establishing uniform specifications, parts, or processes to reduce variety and complexity, improving efficiency, reducing costs, and simplifying supply chain management.", "exam": false, "module": "Supply Chain Design", "topic": "Standardization"}, {"term": "Modularization", "fr": "Modularisation", "en": "A design strategy that creates products from interchangeable, self-contained components (modules) that can be combined in various configurations, enabling mass customization and supply chain efficiency.", "exam": false, "module": "Supply Chain Design", "topic": "Standardization"}, {"term": "Universality", "fr": "Universalité", "en": "A design principle where a component or process can be used across multiple products or platforms, reducing inventory variety and improving economies of scale.", "exam": false, "module": "Supply Chain Design", "topic": "Standardization"}, {"term": "Simplification", "fr": "Simplification", "en": "The process of reducing the complexity of products, processes, or supply chains by eliminating unnecessary variety, steps, or components without reducing value or function.", "exam": false, "module": "Supply Chain Design", "topic": "Simplification"}, {"term": "Design for manufacture and assembly (DFMA)", "fr": "Conception pour la fabrication et l'assemblage (DFMA)", "en": "A design methodology that optimizes products for ease of manufacturing and assembly, reducing production costs, assembly time, and the number of components.", "exam": false, "module": "Supply Chain Design", "topic": "Simplification"}, {"term": "Design for service", "fr": "Conception pour la maintenance", "en": "A design approach that considers ease of maintenance, repair, and servicing of products throughout their life cycle, reducing service costs and improving customer satisfaction.", "exam": false, "module": "Supply Chain Design", "topic": "Simplification"}, {"term": "Quality function deployment (QFD)", "fr": "Déploiement de la fonction qualité (QFD)", "en": "A structured methodology and tool for translating customer requirements (voice of the customer) into technical specifications and design requirements at each stage of product development.", "exam": false, "module": "Supply Chain Design", "topic": "Quality"}, {"term": "Mass customization", "fr": "Personnalisation de masse", "en": "A strategy that combines the cost advantages of mass production with the personalization of custom manufacturing, producing large quantities of personalized products efficiently.", "exam": true, "module": "Supply Chain Design", "topic": "Customization"}, {"term": "Postponement", "fr": "Différenciation retardée", "en": "A supply chain strategy that delays the final configuration or differentiation of a product as long as possible in the supply chain, reducing inventory risk while maintaining responsiveness.", "exam": true, "module": "Supply Chain Design", "topic": "Customization"}, {"term": "Design for the environment (DFE)", "fr": "Conception pour l'environnement (DFE)", "en": "A design approach that considers and minimizes the environmental impact of a product throughout its entire life cycle, including materials, manufacturing, use, and end-of-life disposal.", "exam": false, "module": "Supply Chain Design", "topic": "Sustainability"}, {"term": "Design for remanufacture", "fr": "Conception pour la refabrication", "en": "A design strategy that facilitates the restoration of a product to like-new condition at the end of its first life cycle, supporting circular economy principles.", "exam": false, "module": "Supply Chain Design", "topic": "Sustainability"}, {"term": "Information technology (IT)", "fr": "Technologie de l'information (TI)", "en": "The use of computers, software, networks, and electronic systems to store, process, transmit, and manage information in support of business operations and decision-making.", "exam": false, "module": "Supply Chain Design", "topic": "Role of IT in Supply Chain Management"}, {"term": "Triple bottom line (TBL)", "fr": "Triple bilan (TBL)", "en": "A sustainability accounting framework measuring organizational performance across economic (profit), social (people), and environmental (planet) dimensions.", "exam": true, "module": "Supply Chain Improvement and Best Practices", "topic": "Triple Bottom Line"}, {"term": "GRI Reporting Framework", "fr": "Cadre de reporting GRI", "en": "A globally recognized framework developed by the Global Reporting Initiative enabling organizations to measure and report their sustainability impacts and performance to stakeholders.", "exam": false, "module": "Supply Chain Improvement and Best Practices", "topic": "Sustainability Guidelines and Reporting Initiatives"}, {"term": "ISO 14000 Series Standards", "fr": "Normes de la série ISO 14000", "en": "A family of international standards published by ISO providing tools for organizations to manage environmental responsibilities, including environmental management systems (ISO 14001) and life cycle assessment.", "exam": false, "module": "Supply Chain Improvement and Best Practices", "topic": "Standards, Accreditations, and Certifications"}, {"term": "Employee involvement (EI)", "fr": "Implication des employés", "en": "A management approach that actively engages employees at all levels in problem-solving, decision-making, and continuous improvement activities to improve organizational performance.", "exam": false, "module": "Adopt a Change Management Plan", "topic": "Adopt a Change Management Plan"}, {"term": "Employee empowerment", "fr": "Autonomisation des employés", "en": "The process of giving employees the authority, resources, and accountability to make decisions and take actions within their areas of responsibility to improve performance and customer service.", "exam": false, "module": "Adopt a Change Management Plan", "topic": "Adopt a Change Management Plan"}, {"term": "Performance appraisal", "fr": "Évaluation des performances", "en": "A systematic process for evaluating employee performance against established standards and objectives, providing feedback, identifying development needs, and supporting compensation decisions.", "exam": false, "module": "Adopt a Change Management Plan", "topic": "Adopt a Change Management Plan"}, {"term": "Sunk cost", "fr": "Coût irrécupérable", "en": "A cost that has already been incurred and cannot be recovered regardless of future decisions. Sunk costs should not influence future investment or strategic decisions.", "exam": false, "module": "Assess the Transformation", "topic": "Assess the Transformation"}, {"term": "Total Quality Management (TQM)", "fr": "Approche de gestion d'une organisation, centrée sur la qualité, basée sur la participation de tous ses membres et visant au succès à long terme par la satisfaction du client, ainsi qu'à des avantages pour tous les membres de l'organisation et pour la société.", "en": "A management philosophy and approach focused on continuously improving the quality of products, services, and processes through the involvement of all employees at every level of the organization.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Quality"}, {"term": "Quality Function Deployment (QFD)", "fr": "Méthodologie de conception et de développement de produit ou service, qui a pour but de traduire les besoins et attentes des clients en caractéristiques techniques de conception.", "en": "", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Quality"}, {"term": "Voice of the Customer (VOC)", "fr": "Technique utilisée pour capturer les besoins et attentes exprimés ou non exprimés par les clients.", "en": "", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Quality"}, {"term": "House of Quality (HOQ)", "fr": "Matrice graphique utilisée dans le déploiement des fonctions de la qualité (QFD) pour relier les besoins des clients aux caractéristiques techniques du produit.", "en": "A matrix-based planning tool used in quality function deployment that maps customer requirements to technical characteristics, facilitating the translation of customer needs into design specifications.", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Quality"}, {"term": "Benchmarking", "fr": "Processus continu de comparaison des produits, services et pratiques par rapport aux concurrents les plus sérieux ou aux entreprises reconnues comme leaders.", "en": "The process of measuring an organization's performance metrics and comparing them against best-in-class practices from within the same industry or from other industries to identify improvement opportunities.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Benchmarking"}, {"term": "Lean Production", "fr": "Philosophie de production qui vise à éliminer tous les gaspillages pour optimiser la valeur client.", "en": "A manufacturing philosophy derived from the Toyota Production System focused on creating more value for customers with fewer resources by systematically eliminating all forms of waste.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Just in Time (JIT)", "fr": "Méthode d'organisation de la production qui consiste à ne produire ou à n'acheter que ce qui est nécessaire, au moment où on en a besoin et dans la quantité requise.", "en": "A production strategy that strives to improve a business's return on investment by reducing in-process inventory and associated carrying costs, delivering materials exactly when needed.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Takt Time", "fr": "Cadence de production nécessaire pour répondre exactement à la demande du client.", "en": "The rate at which products must be manufactured to meet customer demand. Calculated by dividing available production time by customer demand rate.", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Kanban", "fr": "Système d'information visuel (carte, étiquette) utilisé pour piloter la production en flux tiré.", "en": "A scheduling system for lean and just-in-time production that uses visual signals (cards, bins, electronic signals) to trigger material movement and production to match actual consumption.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Jidoka", "fr": "Concept consistant à donner aux machines ou aux opérateurs la capacité de détecter une anomalie et d'arrêter immédiatement le travail.", "en": "A lean manufacturing principle originating from Toyota meaning 'automation with a human touch.' Allows equipment to detect abnormalities and stop production automatically, preventing defect propagation.", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Six Sigma", "fr": "Méthode de management de la qualité visant à l'amélioration de l'efficacité et de la qualité des processus par la réduction de la variabilité.", "en": "A data-driven process improvement methodology aiming to reduce defects to 3.4 per million opportunities. Uses the DMAIC framework (Define, Measure, Analyze, Improve, Control) to solve quality problems.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "DMAIC", "fr": "Méthode structurée de résolution de problèmes en cinq étapes : Définir, Mesurer, Analyser, Innover (Améliorer) et Contrôler.", "en": "A structured problem-solving methodology used in Six Sigma consisting of five phases: Define (the problem), Measure (current performance), Analyze (root causes), Improve (implement solutions), Control (sustain gains).", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Waste and Variation"}, {"term": "Root Cause Analysis", "fr": "Méthode d'analyse structurée permettant d'identifier la cause profonde d'un problème afin d'éviter qu'il ne se reproduise.", "en": "A systematic process for identifying the fundamental causes of problems or events, rather than treating symptoms, to prevent recurrence through targeted corrective actions.", "exam": true, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Process Improvements and Quality"}, {"term": "Pareto Chart", "fr": "Graphique à colonnes qui présente les causes d'un problème par ordre décroissant d'importance pour mettre en évidence les causes prioritaires.", "en": "A bar chart that displays categories in descending order of frequency or impact, with a cumulative percentage line, based on the Pareto principle that roughly 80% of effects come from 20% of causes.", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Process Improvements and Quality"}, {"term": "Statistical Process Control (SPC)", "fr": "Méthode de contrôle de la qualité qui utilise des outils statistiques pour surveiller et maîtriser un processus de production.", "en": "The application of statistical methods to monitor and control processes, using control charts to distinguish between common cause variation and special cause variation requiring corrective action.", "exam": false, "module": "Continuous Improvement and Quality Management and Technologies", "topic": "Process Improvements and Quality"}, {"term": "Supply Chain", "fr": "Le réseau de fournisseurs qui livrent des produits à partir de matières premières aux clients finaux par le biais d'un flux d'informations, de biens et d'argent technique ou transactionnel.", "en": "The global network used to deliver products and services from raw materials to end customers through flows of information, physical distribution, and cash.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Define and Classify the Types of Supply Chains"}, {"term": "Supply Chain Management", "fr": "La conception, la planification, l'exécution, le contrôle et le suivi des activités de la chaîne d'approvisionnement dans le but de créer de la valeur nette, de construire une infrastructure compétitive, de tirer parti de la logistique mondiale, de synchroniser l'offre avec la demande et de mesurer la performance à l'échelle mondiale.", "en": "The design, planning, execution, control, and monitoring of supply chain activities with the objective of creating net value, building a competitive infrastructure, and synchronizing supply with demand globally.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Define and Classify the Types of Supply Chains"}, {"term": "Disintermediation", "fr": "Le processus consistant à éliminer une étape ou un échelon intermédiaire dans une chaîne d'approvisionnement. Les frais d'exploitation de la chaîne d'approvisionnement totale sont réduits, le stock total de la chaîne d'approvisionnement est réduit, le temps de cycle total est réduit et les bénéfices parmi les échelons restants sont augmentés.", "en": "The removal of intermediaries from a supply chain or distribution channel, allowing producers to interact directly with consumers, often facilitated by digital technologies and e-commerce.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Define and Classify the Types of Supply Chains"}, {"term": "Reverse Supply Chain", "fr": "La planification et le contrôle des processus de déplacement des marchandises du point de consommation vers le point d'origine pour réparation, récupération, recyclage ou élimination.", "en": "The process of moving goods from their final destination back through the supply chain for returns, repairs, remanufacturing, recycling, or disposal.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Define and Classify the Types of Supply Chains"}, {"term": "Key Success Factors", "fr": "Les attributs du produit, les forces organisationnelles et les accomplissements ayant le plus grand impact sur le succès futur sur le marché.", "en": "The critical elements, competencies, or conditions that are necessary for an organization to achieve its mission and competitive objectives within a specific industry or market.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Competitive Advantage", "fr": "L'avantage d'une entreprise sur ses rivaux pour attirer les clients et se défendre contre les concurrents. Les sources de l'avantage comprennent des caractéristiques qu'un concurrent ne peut pas reproduire sans coût et risque substantiels.", "en": "A condition or circumstance that puts a company in a favorable or superior business position relative to competitors, achieved through cost leadership, differentiation, or focus strategies.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Diversification Strategy", "fr": "Une expansion de la portée de la gamme de produits pour exploiter de nouveaux marchés. Un objectif clé d'une stratégie de diversification est de répartir le risque de l'entreprise sur plusieurs gammes de produits.", "en": "A corporate growth strategy invol
