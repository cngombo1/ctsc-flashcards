ving entry into new markets or product lines that are different from the organization's current business, spreading risk and creating new revenue streams.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Five-forces model of competition", "fr": "Une méthodologie pour analyser les pressions concurrentielles dans un marché et évaluer la force et l'importance de chacune de ces pressions.", "en": "Michael Porter's framework analyzing industry competitive intensity through five forces: threat of new entrants, bargaining power of suppliers, bargaining power of buyers, threat of substitutes, and rivalry among competitors.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Product Life Cycle", "fr": "Les étapes par lesquelles passe un nouveau produit du début à la fin. 2) Le temps écoulé entre la recherche et le développement initiaux et le moment où les ventes et le support du produit aux clients sont retirés. 3) La période pendant laquelle un produit peut être produit et commercialisé de manière rentable.", "en": "", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Order Qualifiers", "fr": "Les caractéristiques concurrentielles qu'une entreprise doit présenter pour être un concurrent viable sur le marché.", "en": "", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Order Winners", "fr": "Les caractéristiques concurrentielles qui incitent les clients d'une entreprise à choisir les biens et services de cette entreprise plutôt que ceux de ses concurrents.", "en": "", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Demand Shaping", "fr": "L'utilisation de tactiques telles que les incitations par le prix, la publicité, le positionnement du produit, les modifications et substitutions de produits ou les programmes commerciaux pour inciter les clients à acheter.", "en": "The use of pricing, promotions, product features, incentives, and other marketing tactics to influence customer demand to better align with supply capabilities and business objectives.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "SWOT Analysis", "fr": "Une analyse des forces, faiblesses, opportunités et menaces de et pour une organisation.", "en": "", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Core Competencies", "fr": "Ensemble de compétences ou de connaissances qui permettent à une entreprise de fournir le plus haut niveau de valeur à ses clients d'une manière difficile à imiter pour les concurrents.", "en": "The unique combination of skills, knowledge, technologies, and processes that give an organization a fundamental competitive advantage and that would be difficult for competitors to imitate.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "Key Performance Indicator (KPI)", "fr": "Une mesure financière ou non financière utilisée pour définir et évaluer les progrès vers des objectifs organisationnels spécifiques. 2) Une mesure utilisée pour évaluer la performance globale ou l'état des lieux.", "en": "", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Supply Chain Strategies"}, {"term": "Supply Chain", "fr": "Le réseau global utilisé pour livrer des produits et services depuis les matières premières jusqu'aux clients finaux à travers un flux technique d'informations, de distribution physique et de liquidités.", "en": "The global network used to deliver products and services from raw materials to end customers through flows of information, physical distribution, and cash.", "exam": true, "module": "Supply Chain Overview", "topic": "Operating Environment"}, {"term": "Supply Chain Management", "fr": "La conception, la planification, l'exécution, le contrôle et le suivi des activités de la chaîne d'approvisionnement dans le but de créer de la valeur nette, de construire une infrastructure compétitive, de tirer parti de la logistique mondiale, de synchroniser l'offre avec la demande et de mesurer la performance à l'échelle mondiale.", "en": "The design, planning, execution, control, and monitoring of supply chain activities with the objective of creating net value, building a competitive infrastructure, and synchronizing supply with demand globally.", "exam": true, "module": "Supply Chain Overview", "topic": "Operating Environment"}, {"term": "Reverse Logistics", "fr": "Une chaîne d'approvisionnement complète dédiée aux retours de produits, qui comprend la gestion des retours clients, le recyclage et la récupération des substances dangereuses ou précieuses à la fin de la vie d'un produit.", "en": "All operations related to the reuse of products and materials, including returns management, recall management, recycling, e-waste disposal, repair, refurbishment, and remanufacturing.", "exam": true, "module": "Supply Chain Overview", "topic": "Operating Environment"}, {"term": "Order Qualifiers", "fr": "Les caractéristiques concurrentielles qu'une entreprise doit présenter pour être un concurrent viable sur le marché.", "en": "", "exam": true, "module": "Supply Chain Overview", "topic": "Operating Environment"}, {"term": "Order Winners", "fr": "Les caractéristiques concurrentielles qui incitent les clients d'une entreprise à choisir les biens et services de cette entreprise plutôt que ceux de ses concurrents.", "en": "", "exam": true, "module": "Supply Chain Overview", "topic": "Operating Environment"}, {"term": "Logistics", "fr": "Dans un contexte de gestion de la chaîne d'approvisionnement, sous-ensemble qui contrôle les flux directs et inverses, la manutention et le stockage des biens. 2) Dans un contexte industriel, l'art et la science d'obtenir, produire et distribuer les matériaux et produits au bon endroit et en quantités appropriées.", "en": "The process of planning, implementing, and controlling the efficient, effective flow and storage of goods, services, and related information from the point of origin to the point of consumption.", "exam": true, "module": "Supply Chain Overview", "topic": "Business Strategy and Supply Chain Planning"}, {"term": "Product Differentiation", "fr": "Stratégie consistant à rendre un produit distinct de la concurrence sur une base autre que le prix, telle que la disponibilité, la durabilité, la qualité ou la fiabilité.", "en": "A marketing strategy by which a company distinguishes its products or services from those of competitors to attract a target market, based on features, quality, design, or brand.", "exam": false, "module": "Supply Chain Overview", "topic": "Business Strategy and Supply Chain Planning"}, {"term": "Bullwhip Effect", "fr": "Un changement extrême de la position de l'offre en amont dans une chaîne d'approvisionnement généré par un petit changement de la demande en aval. Les stocks peuvent rapidement passer d'une situation de rupture à une situation d'excédent.", "en": "The phenomenon of increasing demand variability as one moves upstream in the supply chain. Small fluctuations in consumer demand can cause increasingly amplified variations in orders placed by retailers, wholesalers, and manufacturers.", "exam": true, "module": "Supply Chain Overview", "topic": "Fundamentals of Sales and Operations Planning"}, {"term": "Manufacturing Lead Time", "fr": "Le temps total requis pour fabriquer un article, à l'exclusion du délai d'achat de niveau inférieur. Comprend le temps de préparation de la commande, le temps de file d'attente, le temps de réglage, le temps d'exécution, le temps de transfert, le temps d'inspection et le temps de mise en stock.", "en": "The total time required to manufacture an item from raw material release to finished goods completion, including processing time, queue time, move time, and inspection time.", "exam": false, "module": "Detailed Schedules", "topic": "Schedules and Throughput"}, {"term": "Takt Time", "fr": "Définit la cadence de production pour correspondre au taux de demande des clients ; calculé comme le temps de production disponible divisé par le taux de demande des clients.", "en": "The rate at which products must be manufactured to meet customer demand. Calculated by dividing available production time by customer demand rate.", "exam": false, "module": "Detailed Schedules", "topic": "Schedules and Throughput"}, {"term": "Kanban", "fr": "Méthode de production juste-à-temps qui utilise des contenants standard ou des lots avec une carte attachée à chacun. C'est un système à flux tiré dans lequel les centres de travail signalent qu'ils souhaitent retirer des pièces des opérations d'alimentation.", "en": "A scheduling system for lean and just-in-time production that uses visual signals (cards, bins, electronic signals) to trigger material movement and production to match actual consumption.", "exam": true, "module": "Detailed Schedules", "topic": "Production Activity Control"}, {"term": "Drum-Buffer-Rope", "fr": "La méthode de la théorie des contraintes pour planifier et gérer les opérations qui ont une contrainte interne ou une ressource à capacité limitée.", "en": "A production scheduling methodology based on the Theory of Constraints in which the system's constraint (drum) sets the pace, buffers protect it from variability, and rope synchronizes upstream operations.", "exam": false, "module": "Detailed Schedules", "topic": "TOC Scheduling and PAC"}, {"term": "Decoupled inventory", "fr": "Stock découplé : Stock accumulé entre des opérations pour atténuer les différences de taux de production.", "en": "Inventory that separates two processes so each can operate independently, allowing different production rates or demand patterns to be accommodated without disrupting either stage.", "exam": false, "module": "Inventory Planning", "topic": "Purposes and Goals of Inventory"}, {"term": "Work-in-process (WIP)", "fr": "En-cours : Produits à divers stades d'achèvement dans l'usine.", "en": "Product that has been released for production but has not yet been completed. Represents partially completed goods between the beginning and end of a production process.", "exam": false, "module": "Inventory Planning", "topic": "Inventory Types and Classifications"}, {"term": "MRO supplies", "fr": "Fournitures MRO (maintenance, réparation et exploitation) : Articles utilisés pour le support général de l'exploitation et de la maintenance.", "en": "Maintenance, Repair, and Operations supplies — items consumed in the production process but not part of the finished product, including tools, lubricants, and cleaning supplies.", "exam": false, "module": "Inventory Planning", "topic": "Inventory Types and Classifications"}, {"term": "Safety stock", "fr": "Stock de sécurité : Quantité de stock planifiée pour protéger contre les fluctuations de la demande ou de l'offre.", "en": "Extra inventory held as a buffer against demand uncertainty, supply variability, or lead time variability to prevent stockouts and maintain a desired service level.", "exam": true, "module": "Inventory Planning", "topic": "Inventory Types and Classifications"}, {"term": "Obsolete inventory", "fr": "Stock obsolète : Articles de stock ayant atteint les critères d'obsolescence établis par l'organisation.", "en": "Inventory that is no longer usable, saleable, or relevant due to changes in demand, product design changes, expiration, or supersession by newer models.", "exam": false, "module": "Inventory Planning", "topic": "Inventory Types and Classifications"}, {"term": "ABC classification", "fr": "Classification ABC : Classification d'un groupe d'articles par ordre décroissant de volume monétaire annuel.", "en": "The segmentation of inventory items into three categories (A, B, C) based on value or usage. A items represent high-value/high-usage items requiring tight control; C items are low-value/low-usage requiring minimal control.", "exam": true, "module": "Inventory Planning", "topic": "Item Segmentation"}, {"term": "Kanban", "fr": "Kanban : Signal de demande à un centre de travail en amont pour fournir des pièces fabriquées ou achetées.", "en": "A scheduling system for lean and just-in-time production that uses visual signals (cards, bins, electronic signals) to trigger material movement and production to match actual consumption.", "exam": true, "module": "Inventory Management", "topic": "Push or Pull Replenishment"}, {"term": "Economic order quantity (EOQ)", "fr": "Quantité économique de commande : Type de taille de lot à commander qui minimise le coût total combiné de commande et de possession.", "en": "The order quantity that minimizes the total annual cost of ordering and holding inventory, calculated as the square root of (2 × annual demand × ordering cost / holding cost rate).", "exam": true, "module": "Inventory Management", "topic": "Economic Order Quantity"}, {"term": "Standard deviation", "fr": "Écart-type : Mesure de la dispersion des données par rapport à la moyenne.", "en": "A statistical measure of the dispersion or variability of a set of values from their mean. In inventory management, used to calculate safety stock requirements based on demand variability.", "exam": false, "module": "Inventory Management", "topic": "Safety Stock"}, {"term": "Cold chain", "fr": "Chaîne du froid : Chaîne logistique pour les produits à température contrôlée.", "en": "A temperature-controlled supply chain that maintains a specific low-temperature range from production through distribution and delivery to preserve the quality and safety of perishable goods.", "exam": false, "module": "Inventory Management", "topic": "Special Inventory"}, {"term": "Hazardous materials", "fr": "Matières dangereuses : Matériel classé comme risque pour la santé humaine, animale ou environnementale.", "en": "Substances or materials that pose a risk to health, safety, or property during transportation or handling, requiring special procedures, packaging, labeling, and regulatory compliance.", "exam": false, "module": "Inventory Management", "topic": "Special Inventory"}, {"term": "Opportunity cost", "fr": "Coût d'opportunité : Rendement du capital qui aurait pu résulter si le capital avait été utilisé à d'autres fins.", "en": "The value of the next best alternative foregone when a decision is made. In inventory management, the return on investment that could have been earned had the capital not been tied up in inventory.", "exam": false, "module": "Inventory Costs, Value, and Metrics", "topic": "Inventory Costs and Risk Pooling"}, {"term": "Backflushing", "fr": "Post-déduction : Méthode de comptabilisation des stocks où les composants sont automatiquement déduits après l'achèvement du produit parent.", "en": "A method of inventory management in which material usage is recorded automatically at the completion of a production run, based on the bill of materials, rather than tracking each component individually.", "exam": false, "module": "Inventory Control", "topic": "Inventory Storage, Flow, and Handling"}, {"term": "Vendor-managed inventory (VMI)", "fr": "Gestion des stocks par le fournisseur : Moyen d'optimiser la performance de la chaîne logistique où le fournisseur gère les niveaux de stock du client.", "en": "A replenishment strategy in which the supplier monitors the customer's inventory levels and assumes responsibility for maintaining agreed inventory levels and replenishment timing.", "exam": true, "module": "Inventory Control", "topic": "Inventory Storage, Flow, and Handling"}, {"term": "Cycle counting", "fr": "Inventaire tournant : Inventaire physique permanent de la précision des dossiers de stock.", "en": "An inventory auditing procedure where a portion of the total inventory is counted on a rotating basis so that all items are verified several times per year, without shutting down operations.", "exam": true, "module": "Inventory Control", "topic": "Inventory Accuracy"}, {"term": "Advance ship notice (ASN)", "fr": "Avis d'expédition : Notification électronique de l'expédition d'un produit.", "en": "An electronic notification sent by a supplier to a customer prior to shipment containing details about the shipment including contents, ship date, carrier, and expected arrival time.", "exam": false, "module": "Inventory Control", "topic": "Inventory Traceability"}, {"term": "Waste hierarchy", "fr": "Hiérarchie des déchets : Outil classant les options de gestion des déchets selon leur respect de l'environnement.", "en": "A prioritized framework for waste management that ranks strategies from most preferred to least preferred: Prevention, Reuse, Recycling, Recovery (energy), and Disposal.", "exam": false, "module": "Waste Hierarchy and Reverse Logistics", "topic": "Waste Hierarchy"}, {"term": "Reverse logistics", "fr": "Logistique inverse : Chaîne logistique complète dédiée au flux inverse des produits pour retour, réparation ou recyclage.", "en": "All operations related to the reuse of products and materials including return, recall, repair, refurbishment, remanufacturing, recycling, and responsible disposal.", "exam": true, "module": "Waste Hierarchy and Reverse Logistics", "topic": "Reverse Logistics"}, {"term": "change control board (CCB)", "fr": "comité de contrôle des modifications", "en": "A formally constituted group of stakeholders responsible for reviewing, evaluating, approving, delaying, or rejecting proposed changes to a project's scope, schedule, cost, or quality baseline.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Assign Change Management Roles and Responsibilities"}, {"term": "scope creep", "fr": "dérive du projet", "en": "The uncontrolled expansion of project scope without corresponding adjustments to time, cost, or resources, typically resulting from poorly defined requirements or lack of change control.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Assign Change Management Roles and Responsibilities"}, {"term": "collaborative planning, forecasting, and replenishment (CPFR)", "fr": "planification, prévision et réapprovisionnement collaboratifs (CPFR)", "en": "", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Design and Test Solutions"}, {"term": "triple bottom line (TBL)", "fr": "triple bilan (TBL)", "en": "A sustainability framework measuring organizational performance across three pillars: economic profit, social equity, and environmental stewardship.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Establish Secure, Resilient, and/or Sustainable Supply Chains"}, {"term": "Inventory Management", "fr": "Gestion des stocks : Branche de la gestion d'entreprise qui s'occupe de la planification et du contrôle des stocks.", "en": "The branch of business management concerned with planning, directing, and controlling the flow of inventory through the supply chain, balancing service levels with cost efficiency.", "exam": false, "module": "Inventory Management", "topic": "Foundations of Inventory"}, {"term": "Decoupling inventory", "fr": "Stock de découplage : Quantité de stock maintenue entre des entités d'un réseau de fabrication ou de distribution pour créer une indépendance entre les processus ou les entités.", "en": "Inventory that separates sequential production or supply chain stages, allowing each stage to operate at its own optimal rate and reducing the propagation of variability between stages.", "exam": false, "module": "Inventory Management", "topic": "Inventory Targets"}, {"term": "Raw material", "fr": "Matière première : Articles achetés ou matériaux extraits qui sont convertis, par le processus de fabrication, en composants et produits.", "en": "Unprocessed material or input goods purchased from suppliers that will be converted through manufacturing into components, subassemblies, or finished products.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Work in process (WIP)", "fr": "En-cours (de fabrication) : Bien ou biens à différents stades d'achèvement dans toute l'usine.", "en": "Products partially through the manufacturing process, including all materials, components, and subassemblies that have been released for production but not yet completed as finished goods.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Finished goods inventory", "fr": "Stocks de produits finis : Articles sur lesquels toutes les opérations de fabrication, y compris le test final, ont été achevées.", "en": "Completed products that have passed all quality checks and are ready for shipment or sale to customers.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Distribution inventory", "fr": "Stocks de distribution : Stocks, généralement des pièces de rechange et des produits finis, situés dans le système de distribution.", "en": "Inventory maintained at distribution points (warehouses, distribution centers, retail locations) to support customer service and reduce delivery lead times.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "MRO supplies", "fr": "Fournitures MRO (maintenance, réparations et opérations) : Articles utilisés pour le soutien des opérations générales et de la maintenance.", "en": "Maintenance, Repair, and Operations supplies — items consumed in the production process but not part of the finished product, including tools, lubricants, and cleaning supplies.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Safety stock", "fr": "Stock de sécurité : Quantité de stock prévue en inventaire pour se protéger contre les fluctuations de la demande ou de l'approvisionnement.", "en": "Extra inventory held as a buffer against demand uncertainty, supply variability, or lead time variability to prevent stockouts and maintain a desired service level.", "exam": true, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Anticipation inventories", "fr": "Stocks d'anticipation : Stocks supplémentaires s'ajoutant au stock de base pour couvrir les tendances prévues de hausse des ventes.", "en": "Inventory built up in advance of an expected peak in demand, a planned supply disruption, or a promotional event to ensure availability during the high-demand period.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Lot-size inventory", "fr": "Stock par lot : Stock qui résulte de l'achat ou de la production par lots plus importants que ceux nécessaires pour les besoins immédiats.", "en": "Inventory resulting from purchasing or producing in quantities larger than needed immediately, driven by economies of scale in ordering or production.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Cycle stock", "fr": "Stock de cycle : L'une des deux principales composantes conceptuelles de tout stock d'article, le stock de cycle est la composante la plus active.", "en": "The portion of inventory that results from the replenishment process, representing the average inventory on hand between replenishment orders. Also called lot-size inventory or base stock.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Hedge inventory", "fr": "Stock de couverture : Forme de constitution de stock pour se protéger contre un événement qui pourrait ne pas se produire.", "en": "Inventory acquired to protect against anticipated price increases, supply shortages, or currency fluctuations that could impact future procurement costs.", "exam": false, "module": "Inventory Management", "topic": "Types and Functions of Inventory"}, {"term": "Balance sheet", "fr": "Bilan : État financier montrant les ressources possédées, les dettes dues et la part du propriétaire d'une entreprise à un moment donné.", "en": "A financial statement showing a company's assets, liabilities, and shareholders' equity at a specific point in time, representing the accounting equation: Assets = Liabilities + Equity.", "exam": false, "module": "Inventory Management", "topic": "Basic Accounting"}, {"term": "Income statement", "fr": "Compte de résultat : État financier montrant le revenu net d'une entreprise sur une période donnée.", "en": "A financial statement showing revenues, expenses, and net profit or loss over a defined accounting period. Also called profit and loss (P&L) statement.", "exam": false, "module": "Inventory Management", "topic": "Basic Accounting"}, {"term": "Inventory turnover", "fr": "Rotation des stocks : Nombre de fois qu'un stock effectue un cycle ou « tourne » pendant l'année.", "en": "A ratio measuring how many times inventory is sold and replaced over a given period. Calculated as cost of goods sold divided by average inventory value.", "exam": false, "module": "Inventory Management", "topic": "Basic Accounting"}, {"term": "Generally accepted accounting principles (GAAP)", "fr": "Principes comptables généralement reconnus (PCGR) : Pratiques comptables conformes aux conventions, règles et procédures acceptées par la profession comptable.", "en": "A set of accounting standards, principles, and procedures issued by the Financial Accounting Standards Board (FASB) used by companies in the United States for financial reporting.", "exam": false, "module": "Inventory Management", "topic": "Inventory Valuation"}, {"term": "First-in, first-out (FIFO)", "fr": "Premier entré, premier sorti (PEPS) : Méthode de valorisation des stocks où les premiers articles mis en stock sont les premiers retirés.", "en": "An inventory valuation method assuming that the oldest inventory items are sold first, so ending inventory consists of the most recently purchased items. Common for perishable goods.", "exam": false, "module": "Inventory Management", "topic": "Inventory Valuation"}, {"term": "Last-in, first-out (LIFO)", "fr": "Dernier entré, premier sorti (DEPS) : Méthode de valorisation des stocks où les derniers articles mis en stock sont les premiers retirés.", "en": "An inventory valuation method assuming that the most recently acquired items are sold first. Reduces taxable income in periods of rising prices but may not reflect physical inventory flow.", "exam": false, "module": "Inventory Management", "topic": "Inventory Valuation"}, {"term": "Distribution requirements planning (DRP)", "fr": "Planification des ressources de distribution (DRP) : Fonction consistant à déterminer les besoins de réapprovisionnement des stocks des entrepôts locaux.", "en": "A system for planning the replenishment of field inventories in a distribution network, using time-phased logic similar to MRP to calculate requirements at each distribution point.", "exam": true, "module": "Order Quantity and Item Replenishment", "topic": "Push and Pull Methods"}, {"term": "Cash-to-cash cycle time", "fr": "temps de cycle de trésorerie", "en": "The time elapsed from when a company pays for raw materials to when it receives payment from customers for finished products. A key measure of working capital efficiency.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Procure and Deliver Goods and Services"}, {"term": "Demand forecasting", "fr": "prévisions de la demande", "en": "The process of estimating future customer demand using historical data, statistical models, market intelligence, and collaborative input from sales and marketing.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Demand management"}, {"term": "Supplier relationship management (SRM)", "fr": "gestion de la relation fournisseur", "en": "A systematic approach to evaluate suppliers' contributions and influence on success, and to develop strategies to maximize supplier performance and value to the organization.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Supply management"}, {"term": "Reverse logistics", "fr": "logistique inverse", "en": "All operations related to the reuse of products and materials including return, recall, repair, refurbishment, remanufacturing, recycling, and responsible disposal.", "exam": true, "module": "Supply Chain Planning and Execution", "topic": "Manage Reverse Logistics including Return, Recall, and End of Life"}, {"term": "Theory of constraints (TOC)", "fr": "théorie des contraintes", "en": "A management philosophy developed by Dr. Eliyahu Goldratt based on identifying and systematically improving the most limiting factor (constraint) that stands in the way of achieving system goals.", "exam": true, "module": "Supply Chain Improvement and Best Practices", "topic": "Measure, Analyze, and Improve the Supply Chain"}, {"term": "Value at risk (VAR)", "fr": "valeur exposée au risque", "en": "A statistical measure of the maximum potential loss in value of a portfolio or supply chain position over a defined period for a given confidence interval.", "exam": false, "module": "Supply Chain Improvement and Best Practices", "topic": "Manage Risk in the Supply Chain"}, {"term": "Master Production Schedule (MPS)", "fr": "Programme directeur de production (PDP)", "en": "", "exam": false, "module": "Plan Supply", "topic": "Master Scheduling"}, {"term": "Master Scheduling", "fr": "Établissement du programme directeur de production", "en": "The process of creating and maintaining the master production schedule, balancing demand against available capacity and inventory, and ensuring the feasibility of production plans.", "exam": true, "module": "Plan Supply", "topic": "Master Scheduling"}, {"term": "Available-to-Promise (ATP)", "fr": "Disponible à la vente (DAV)", "en": "", "exam": true, "module": "Plan Supply", "topic": "Master Scheduling"}, {"term": "Projected Available Balance (PAB)", "fr": "Stock disponible prévisionnel", "en": "The running sum of on-hand inventory minus requirements plus scheduled receipts, projected through time in the master schedule to determine future availability.", "exam": false, "module": "Plan Supply", "topic": "Master Scheduling"}, {"term": "Material Requirements Planning (MRP)", "fr": "Calcul des besoins nets (CBN)", "en": "", "exam": false, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Bill of Material (BOM)", "fr": "Nomenclature", "en": "A structured list of all components, subassemblies, raw materials, and quantities needed to produce a finished product. Forms a key input to the MRP process.", "exam": true, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Exploding", "fr": "Éclatement", "en": "The process of multiplying the requirements for a parent item by its usage per unit at each level of the bill of materials to determine gross requirements for components.", "exam": false, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Lead-time offsetting", "fr": "Décalage sur le délai", "en": "The MRP process of subtracting lead time from a required date to determine when a planned order must be released to ensure availability when needed.", "exam": false, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Gross Requirements", "fr": "Besoins bruts", "en": "In MRP, the total quantity of a component or item needed to meet all parent item demands and safety stock before considering on-hand inventory or scheduled receipts.", "exam": false, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Net Requirements", "fr": "Besoins nets", "en": "In MRP, the quantity of a component or item required after subtracting on-hand inventory and scheduled receipts from gross requirements.", "exam": false, "module": "Plan Supply", "topic": "Material Requirements Planning"}, {"term": "Rough-Cut Capacity Planning (RCCP)", "fr": "Plan de charge global", "en": "", "exam": false, "module": "Plan Supply", "topic": "Rough-Cut Capacity Planning"}, {"term": "Bill of Resources", "fr": "Nomenclature de ressources", "en": "A listing of key resources (capacity, labor, materials) required to produce one unit of a product, used in rough-cut capacity planning to validate master schedule feasibility.", "exam": false, "module": "Plan Supply", "topic": "Rough-Cut Capacity Planning"}, {"term": "Capacity Requirements Planning (CRP)", "fr": "Calcul des charges détaillées", "en": "A more detailed capacity planning process that uses open shop orders and planned orders from MRP to calculate detailed capacity requirements at each work center.", "exam": false, "module": "Plan Supply", "topic": "Rough-Cut Capacity Planning"}, {"term": "Distribution Requirements Planning (DRP)", "fr": "Planification des ressources de distribution", "en": "", "exam": true, "module": "Distribution", "topic": "Distribution Road Map"}, {"term": "Landed Cost", "fr": "Coût rendu dédouané", "en": "The total cost of a product including purchase price, freight, insurance, import duties, and all other costs incurred in bringing the product to the point of destination.", "exam": false, "module": "Distribution", "topic": "Distribution Road Map"}, {"term": "Cross-docking", "fr": "Correspondance à quai", "en": "A logistics practice in which products from a supplier or manufacturing plant are distributed directly to customers or retail chains with minimal or no handling and storage time.", "exam": false, "module": "Distribution", "topic": "Network Configuration"}, {"term": "Economic Order Quantity (EOQ)", "fr": "Quantité économique de commande", "en": "", "exam": false, "module": "Distribution", "topic": "Replenishment Planning"}, {"term": "Safety Stock", "fr": "Stock de sécurité", "en": "", "exam": false, "module": "Distribution", "topic": "Replenishment Planning"}, {"term": "Supply Chain Risk Management", "fr": "Gestion des risques de la chaîne logistique", "en": "The identification, assessment, treatment, and monitoring of supply chain risks to protect continuity of supply, reduce vulnerability, and improve overall supply chain resilience.", "exam": false, "module": "Supply Chain Improvement and Best Practices", "topic": "Risk Management"}, {"term": "Risk Mitigation", "fr": "Atténuation des risques", "en": "The actions taken to reduce the probability or impact of identified supply chain risks, including supplier diversification, dual sourcing, safety stock, and contingency planning.", "exam": true, "module": "Supply Chain Improvement and Best Practices", "topic": "Risk Response Planning"}, {"term": "Balanced scorecard", "fr": "Système de pilotage et de mesure de la performance d’une organisation selon quatre axes : financier, clients, processus internes et apprentissage organisationnel.", "en": "A strategic management tool developed by Kaplan and Norton translating vision and strategy into performance measures across four perspectives: financial, customer, internal processes, and learning and growth.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Research Models, Frameworks, and Benchmarking Tools"}, {"term": "ISO standards", "fr": "Normes internationales établies par l’Organisation internationale de normalisation.", "en": "A set of voluntary international standards developed by the International Organization for Standardization (ISO) providing specifications, guidelines, and requirements for products, services, and management systems.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Research Models, Frameworks, and Benchmarking Tools"}, {"term": "Lean", "fr": "Philosophie de production qui se concentre sur l’élimination des gaspillages et la création de valeur pour le client.", "en": "A management philosophy focused on creating maximum value for customers while minimizing waste across all processes, derived from the Toyota Production System and applicable throughout the supply chain.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Explore Cost and Service Optimization Roadmaps"}, {"term": "Six Sigma", "fr": "Méthode de management de la qualité visant à réduire la variabilité des processus pour atteindre un niveau de défaut quasi nul.", "en": "A data-driven process improvement methodology aiming to reduce defects to 3.4 per million opportunities. Uses the DMAIC framework (Define, Measure, Analyze, Improve, Control) to solve quality problems.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Explore Cost and Service Optimization Roadmaps"}, {"term": "Theory of Constraints (TOC)", "fr": "Philosophie de gestion qui repose sur l'idée que la performance globale d'un système est limitée par son maillon le plus faible ou contrainte.", "en": "A management methodology focusing on identifying and removing the single biggest constraint limiting a system from achieving its goal, then repeating the process for continuous improvement.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Explore Cost and Service Optimization Roadmaps"}, {"term": "Risk identification", "fr": "Processus de recherche, de reconnaissance et de description des risques.", "en": "The process of determining which risks may affect a supply chain or project and documenting their characteristics, triggers, and potential impact on business objectives.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Risk Management Methodology"}, {"term": "Voice of the Customer (VOC)", "fr": "Méthode de collecte des besoins et des attentes des clients pour orienter la conception des produits et services.", "en": "", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Select Supply Chain Transformation Drivers"}, {"term": "Project charter", "fr": "Document formel qui définit l’existence d’un projet, ses objectifs, son périmètre et ses principales parties prenantes.", "en": "A formal document authorizing the existence of a project, defining its scope, objectives, stakeholders, authority, and initial resource allocation.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Initiate Transformation Workstreams and Projects"}, {"term": "Change management", "fr": "Démarche visant à accompagner les transformations au sein d'une organisation pour en assurer l'acceptation et la réussite.", "en": "A structured approach to transitioning individuals, teams, and organizations from a current state to a desired future state, managing the human side of change to achieve required business outcomes.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Initiate Transformation Workstreams and Projects"}, {"term": "Extrinsic motivators", "fr": "Facteurs de motivation externes à l’individu, tels que les récompenses financières ou la reconnaissance sociale.", "en": "External rewards and incentives that drive behavior, including compensation, bonuses, recognition, promotions, and performance targets, as opposed to intrinsic motivation arising from internal satisfaction.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Adopt a Change Management Plan"}, {"term": "Prototyping", "fr": "Création d'un modèle préliminaire d'un produit ou d'un processus pour tester des concepts et des fonctionnalités.", "en": "The development of a preliminary model or functional version of a solution to test and validate concepts before full implementation, gathering stakeholder feedback in iterative cycles.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Design and Test Solutions"}, {"term": "Lessons learned", "fr": "Connaissances acquises au cours d'un projet qui peuvent être appliquées à de futurs projets pour améliorer les performances.", "en": "Knowledge and understanding gained from completed projects or operations that can be applied to improve future performance. Captured through formal retrospectives and documented for organizational learning.", "exam": false, "module": "Review of Supply Chain Transformation", "topic": "Reflect on the Transformation"}, {"term": "Supply chain", "fr": "Le réseau de fournisseurs qui livrent des produits depuis les matières premières jusqu’aux clients finaux via un flux organisé ou transactionnel d’informations, de biens et d’argent.", "en": "", "exam": false, "module": "Supply Chain Transformations", "topic": "Supply Chain Overview"}, {"term": "Supply chain management", "fr": "La conception, la planification, l’exécution, le contrôle et le suivi des activités de la chaîne logistique dans le but de créer de la valeur nette, de construire une infrastructure compétitive, de tirer parti de la logistique mondiale, de synchroniser l’offre et la demande et de mesurer la performance globale.", "en": "", "exam": false, "module": "Supply Chain Transformations", "topic": "Supply Chain Overview"}, {"term": "Balanced scorecard", "fr": "Une liste de mesures financières et opérationnelles utilisées pour évaluer la performance organisationnelle ou celle de la chaîne logistique. Les dimensions peuvent inclure les perspectives clients, les processus métiers, la finance, ainsi que l'innovation et l'apprentissage.", "en": "A strategic management tool developed by Kaplan and Norton translating vision and strategy into performance measures across four perspectives: financial, customer, internal processes, and learning and growth.", "exam": true, "module": "Supply Chain Transformations", "topic": "Value Proposition, Methodologies, and Organizational Design"}, {"term": "Value stream mapping", "fr": "Un outil de production « lean » pour comprendre visuellement le flux de matériaux du fournisseur au client, incluant le processus actuel ainsi que le temps à valeur ajoutée et non ajoutée de toutes les étapes.", "en": "A lean management tool for visualizing all steps in a value stream (the sequence of activities required to deliver a product or service), identifying waste and improvement opportunities.", "exam": true, "module": "Supply Chain Transformations", "topic": "Value Proposition, Methodologies, and Organizational Design"}, {"term": "Sunk cost", "fr": "Le solde non recouvré d'un investissement. C'est un coût déjà payé qui n'est pas pertinent pour la décision à prendre concernant l'avenir.", "en": "A cost that has already been incurred and cannot be recovered regardless of future decisions. Sunk costs should not influence future investment or strategic decisions.", "exam": false, "module": "Review of Supply Chain Transformation", "topic": "Review and Provide Feedback on Project Portfolio Performance"}, {"term": "Gap analysis", "fr": "Un outil conçu pour évaluer les différences qui existent entre un service offert et les attentes des clients.", "en": "The process of comparing current state performance or capabilities against desired future state benchmarks to identify specific areas for improvement or investment.", "exam": true, "module": "Select Supply Chain Transformation Drivers", "topic": "Assess Supply Chain Current State"}, {"term": "Return on investment (ROI)", "fr": "Une mesure relative de la performance financière qui fournit un moyen de comparer divers investissements en calculant les bénéfices retournés pendant une période spécifiée.", "en": "A financial performance measure evaluating the efficiency of an investment, calculated as net profit divided by the cost of the investment, expressed as a percentage.", "exam": true, "module": "Select Supply Chain Transformation Drivers", "topic": "Develop and Iterate Preliminary Transformation Business Cases"}, {"term": "Economic value added (EVA)", "fr": "En comptabilité de gestion, le bénéfice net d'exploitation réalisé au-delà du coût du capital pour un centre de profit.", "en": "A financial performance metric representing the value created above the required return of shareholders. Calculated as net operating profit after tax minus the cost of capital employed.", "exam": true, "module": "Select Supply Chain Transformation Drivers", "topic": "Develop and Iterate Preliminary Transformation Business Cases"}, {"term": "Five whys", "fr": "Une pratique courante dans la gestion de la qualité totale qui consiste à demander « pourquoi » cinq fois face à un problème pour en identifier la cause profonde.", "en": "A root cause analysis technique that asks 'Why?' repeatedly (typically five times) to trace the chain of causality from a problem symptom back to its root cause.", "exam": true, "module": "Select Supply Chain Transformation Drivers", "topic": "Perform Post-Approval Tasks"}, {"term": "Project", "fr": "Un effort temporaire entrepris pour créer un produit, un service ou un résultat unique. Un projet a un début et une fin définis et est réalisé pour atteindre des objectifs spécifiques dans des contraintes de portée, de délai, de coût et de qualité. (Source : PMI PMBOK)", "en": "A temporary endeavor undertaken to create a unique product, service, or result. Projects have defined start and end dates and are executed within constraints of scope, time, cost, and quality.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Create Portfolio Charter and Select Supply Chain Transformation Tools"}, {"term": "Portfolio", "fr": "Un ensemble de projets, de programmes, de portefeuilles subsidiaires et d'opérations gérés en groupe pour atteindre des objectifs stratégiques organisationnels. La gestion de portefeuille permet d'aligner les investissements avec la stratégie de l'organisation et d'optimiser l'allocation des ressources. (Source : PMI PMBOK)", "en": "A collection of projects, programs, subsidiary portfolios, and operations managed as a group to achieve strategic business objectives and optimize resource allocation.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Create Portfolio Charter and Select Supply Chain Transformation Tools"}, {"term": "Program", "fr": "Un groupe de projets connexes, de programmes subsidiaires et d'activités de programme gérés de manière coordonnée pour obtenir des bénéfices non disponibles lors d'une gestion individuelle de chaque projet. Un programme est aligné sur les objectifs stratégiques de l'organisation. (Source : PMI PMBOK)", "en": "A group of related projects, subsidiary programs, and program activities managed in a coordinated way to obtain benefits and control not available from managing them individually.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Create Portfolio Charter and Select Supply Chain Transformation Tools"}, {"term": "Digital Capabilities Model (DCM) for Supply Networks", "fr": "Un cadre développé par l'ASCM pour évaluer et guider le développement des capacités numériques au sein des réseaux de chaîne d'approvisionnement. Le DCM identifie les domaines de capacité numérique essentiels à la transformation — incluant la connectivité des données, l'analytique avancée, l'automatisation et la collaboration numérique — et permet aux organisations de situer leur niveau de maturité numérique. (Source : ASCM SCOR DS)", "en": "An ASCM framework for assessing and developing digital capabilities within supply networks, identifying maturity levels across data connectivity, advanced analytics, automation, and digital collaboration.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Create Portfolio Charter and Select Supply Chain Transformation Tools"}, {"term": "Smart operations", "fr": "Des opérations qui utilisent des technologies numériques avancées — telles que l'intelligence artificielle, l'Internet des objets (IoT), l'automatisation robotisée et l'analyse de données en temps réel — pour optimiser les processus de supply chain, améliorer la visibilité opérationnelle et permettre une prise de décision plus rapide et plus précise. (Source : ASCM SCOR DS)", "en": "Operations using advanced digital technologies including AI, IoT, robotics, and real-time analytics to optimize supply chain processes and enable faster, more accurate decision-making.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Responsive demand-supply matching (RDSM)", "fr": "Une capacité de supply chain qui permet d'aligner dynamiquement l'offre et la demande en temps quasi réel, en utilisant des données actualisées et des algorithmes avancés pour ajuster rapidement les plans de production, d'approvisionnement et de distribution en réponse aux variations de la demande du marché. (Source : ASCM SCOR DS)", "en": "A supply chain capability enabling dynamic alignment of supply and demand in near real-time using advanced algorithms and updated data to rapidly adjust production, procurement, and distribution plans.", "exam": false, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Supply chain control towers", "fr": "Une solution technologique centralisée qui offre une visibilité de bout en bout sur l'ensemble de la chaîne d'approvisionnement. Elle agrège les données de sources multiples, fournit des tableaux de bord en temps réel, détecte les perturbations potentielles et permet aux gestionnaires de prendre des décisions proactives et informées pour maintenir la continuité des opérations. (Source : ASCM SCOR DS / Gartner)", "en": "Centralized technology solutions providing end-to-end visibility across the supply chain, aggregating data from multiple sources, providing real-time dashboards, and enabling proactive decision-making during disruptions.", "exam": true, "module": "Preparing for Supply Chain Transformation", "topic": "Product and Service Technologies"}, {"term": "Stable Supply Chain", "fr": "Un stade de maturité de la supply chain caractérisé par des processus prévisibles, une gestion efficace des opérations courantes et une faible variabilité des performances. À ce niveau, l'organisation maîtrise ses opérations de base mais n'a pas encore intégré les capacités avancées d'agilité, de résilience ou de transformation numérique propres aux stades de maturité supérieurs. (Source : ASCM Supply Chain Maturity Model)", "en": "A supply chain maturity stage characterized by predictable processes, effective management of routine operations, and low performance variability, without yet having advanced agility or digital transformation capabilities.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand the Supply Chain Maturity Stages"}, {"term": "Market Penetration", "fr": "Une stratégie de croissance par laquelle une organisation cherche à augmenter sa part de marché pour des produits ou services existants dans des marchés existants. Cela peut s'accomplir par des ajustements de prix, une augmentation des efforts marketing, une amélioration de la distribution ou une intensification de l'utilisation par les clients actuels. L'une des quatre stratégies de la matrice d'Ansoff. (Source : Ansoff Matrix / Kaplan & Norton)", "en": "A growth strategy seeking to increase market share for existing products in existing markets through pricing adjustments, increased marketing efforts, or improved distribution. One of Ansoff's four growth strategies.", "exam": false, "module": "Supply Chain Transformation Overview", "topic": "Understand Organizational and Business Unit Strategies"}, {"term": "ADKAR model", "fr": "Un modèle de gestion du changement développé par Prosci qui identifie cinq conditions nécessaires à un changement individuel réussi : Awareness (Prise de conscience du besoin de changement), Desire (Désir de participer et de soutenir le changement), Knowledge (Connaissance de la manière de changer), Ability (Capacité à mettre en œuvre les nouvelles compétences), Reinforcement (Renforcement pour maintenir le changement dans le temps). (Source : Prosci / Hiatt 2006)", "en": "A change management model by Prosci identifying five conditions for successful individual change: Awareness, Desire, Knowledge, Ability, and Reinforcement.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Select and Tailor Change Management Method"}, {"term": "Kotter’s change model", "fr": "Un modèle de transformation organisationnelle en 8 étapes développé par John Kotter : (1) Créer un sentiment d'urgence, (2) Former une coalition directrice, (3) Développer une vision stratégique, (4) Communiquer la vision, (5) Responsabiliser les collaborateurs, (6) Générer des victoires à court terme, (7) Consolider les gains et accélérer le changement, (8) Ancrer les nouvelles approches dans la culture organisationnelle. (Source : Kotter International / HBR)", "en": "", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Select and Tailor Change Management Method"}, {"term": "gold plating", "fr": "En gestion de projet, la pratique consistant à ajouter des fonctionnalités ou des améliorations au-delà de ce qui est requis par le client ou les spécifications du projet, sans approbation formelle. Bien qu'apparemment bénéfique, cette pratique est considérée comme un risque car elle peut entraîner des dépassements de coûts, des retards et une complexité accrue sans valeur ajoutée validée pour le client. (Source : PMI PMBOK)", "en": "The practice of adding features or enhancements beyond what the customer or project specifications require, without formal approval — considered a project management risk that increases cost and complexity.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Assign Change Management Roles and Responsibilities"}, {"term": "PRINCE2", "fr": "PRINCE2 (Projects IN Controlled Environments) est une méthodologie structurée de gestion de projet largement utilisée à l'échelle internationale. Elle définit des processus, des rôles, des responsabilités et des thèmes pour gérer les projets de manière efficace. PRINCE2 met l'accent sur la justification continue du projet par un business case, la gestion par étapes et l'adaptation de la méthode à la taille et la complexité du projet. (Source : AXELOS PRINCE2)", "en": "A structured project management methodology (Projects IN Controlled Environments) defining processes, roles, and themes for effective project governance, widely used internationally in both public and private sectors.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Provide Planned Communications and Training"}, {"term": "SCOR DS", "fr": "SCOR DS (Supply Chain Operations Reference Digital Standard) est la version numérique actualisée du modèle SCOR, développée et approuvée par l'ASCM. SCOR DS intègre des processus numériques, des flux de données et des technologies émergentes dans le cadre de référence de la supply chain, couvrant les domaines d'orchestration, de planification, d'approvisionnement, de commande, de transformation, d'exécution et de retour dans un environnement de supply chain numérique. (Source : ASCM SCOR DS)", "en": "The ASCM SCOR Digital Standard — the digital evolution of the SCOR model integrating digital processes, data flows, and emerging technologies into a unified supply chain reference framework.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Provide Planned Communications and Training"}, {"term": "storyboarding", "fr": "Une technique visuelle utilisée dans la conception de solutions pour illustrer séquentiellement les étapes d'un processus, d'une expérience utilisateur ou d'un scénario de transformation. Le storyboarding permet aux équipes de visualiser, de tester et de communiquer des solutions proposées avant leur mise en œuvre, facilitant les retours d'information précoces des parties prenantes et réduisant les risques de conception. (Source : Design Thinking / IDEO)", "en": "A visual technique used in solution design to illustrate sequentially the steps of a process or user experience, enabling teams to visualize, test, and communicate proposed solutions before implementation.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Design and Test Solutions"}, {"term": "prototyping", "fr": "Le développement d'une version préliminaire ou d'un modèle fonctionnel d'une solution afin de tester et de valider des concepts avant le déploiement complet. Le prototypage permet d'identifier les problèmes potentiels en amont, de recueillir les retours des parties prenantes dans un cycle itératif et de réduire les risques et les coûts associés à la mise en œuvre de nouvelles solutions de supply chain. (Source : Design Thinking / Agile)", "en": "The development of a preliminary model of a solution to test concepts before full deployment, gathering early stakeholder feedback and reducing implementation risk.", "exam": false, "module": "Executing Supply Chain Transformation", "topic": "Design and Test Solutions"}, {"term": "project portfolio management (PPM)", "fr": "Un processus de gestion centralisée d'un ensemble de projets et de programmes visant à atteindre les objectifs stratégiques de l'organisation. Le PPM permet d'optimiser l'allocation des ressources, de prioriser les initiatives selon leur valeur stratégique, d'assurer l'alignement des projets avec la stratégie d'entreprise et de gérer les interdépendances et les risques à l'échelle du portefeuille. (Source : PMI / Gartner)", "en": "The centralized management of a portfolio of projects and programs to achieve strategic objectives, optimizing resource allocation and managing interdependencies across initiatives.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Set Portfolio and Project Management Governance"}, {"term": "Global Reporting Initiative (GRI)", "fr": "Un organisme international indépendant qui a développé les Normes GRI, le cadre mondial le plus largement utilisé pour la production de rapports de durabilité. Les Normes GRI permettent aux organisations de mesurer et de communiquer de manière transparente leurs impacts sur l'économie, l'environnement et la société (ESG — Environnement, Social, Gouvernance), facilitant ainsi la reddition de comptes auprès des parties prenantes. (Source : GRI Standards — globalreporting.org)", "en": "An independent international organization that developed the GRI Standards — the most widely used global framework for sustainability reporting, covering environmental, social, and governance (ESG) impacts.", "exam": true, "module": "Executing Supply Chain Transformation", "topic": "Establish Secure, Resilient, and/or Sustainable Supply Chains"}, {"term": "Balanced scorecard", "fr": "Un outil de gestion stratégique développé par Robert Kaplan et David Norton qui traduit la vision et la stratégie d'une organisation en un ensemble équilibré d'indicateurs de performance couvrant quatre perspectives : (1) Financière, (2) Client, (3) Processus internes, (4) Apprentissage et croissance. Il permet de relier les actions opérationnelles quotidiennes aux objectifs stratégiques à long terme. (Source : Kaplan & Norton, Harvard Business Review 1992)", "en": "A strategic management tool developed by Kaplan and Norton translating vision and strategy into performance measures across four perspectives: financial, customer, internal processes, and learning and growth.", "exam": true, "module": "Supply Chain Design", "topic": "Develop the Supply Chain Strategy"}, {"term": "SCOR® model", "fr": "Le modèle SCOR® (Supply Chain Operations Reference) est un modèle de référence de processus développé par le Supply Chain Council et approuvé par l'ASCM comme outil de diagnostic intersectoriel standard pour la gestion de la supply chain. Il décrit les activités commerciales associées à la satisfaction de la demande client, notamment la planification, l'approvisionnement, la transformation, la livraison et le retour. Il sert de base au SCOR Digital Standard (SCOR DS). (Source : ASCM SCOR Model)", "en": "The Supply Chain Operations Reference model — a cross-industry process reference model endorsed by ASCM describing supply chain activities from customer demand through fulfillment, including plan, source, make, deliver, return, and enable.", "exam": true, "module": "Supply Chain Design", "topic": "Design the Supply Chain"}, {"term": "Enterprise resources planning (ERP)", "fr": "Un système logiciel intégré qui centralise et automatise la gestion des ressources et des processus d'une organisation, incluant la finance, les ressources humaines, la production, la supply chain et la gestion des stocks. Les systèmes ERP offrent une visibilité en temps réel sur l'ensemble des opérations, éliminent les silos d'information et facilitent la prise de décision basée sur des données unifiées. Exemples : SAP, Oracle, Microsoft Dynamics. (Source : ASCM Dictionary / Gartner)", "en": "An integrated software platform centralizing and automating core business processes including finance, HR, manufacturing, supply chain, and procurement, providing real-time organizational visibility.", "exam": true, "module": "Supply Chain Design", "topic": "Key technology applications"}, {"term": "Lean", "fr": "Une philosophie et un ensemble de méthodes de gestion visant à maximiser la valeur pour le client tout en éliminant systématiquement le gaspillage (muda). Originaire du Système de Production Toyota (TPS), le Lean identifie sept catégories de gaspillages : la surproduction, l'attente, le transport inutile, la surqualité, les stocks excessifs, les mouvements inutiles et les défauts/retouches. Il s'applique à l'ensemble des processus de la supply chain. (Source : ASCM Dictionary / Toyota Production System)", "en": "A management philosophy focused on creating maximum value for customers while minimizing waste across all processes, derived from the Toyota Production System and applicable throughout the supply chain.", "exam": true, "module": "Supply Chain Improvement and Best Practices", "topic": "Measure, Analyze, and Improve the Supply Chain"}, {"term": "Six Sigma", "fr": "Une méthodologie d'amélioration des processus basée sur des données statistiques, visant à réduire les défauts et la variabilité des processus à un niveau de 3,4 défauts par million d'opportunités (DPMO). Six Sigma utilise la démarche DMAIC — Définir, Mesurer, Analyser, Améliorer (Improve), Contrôler — pour résoudre les problèmes de qualité et améliorer durablement les performances des processus de supply chain. (Source : ASCM Dictionary / Motorola / GE)", "en": "A data-driven process improvement methodology aiming to reduce defects to 3.4 per million opportunities. Uses the DMAIC framework (Define, Measure, Analyze, Improve, Control) to solve quality problems.", "exam": true, "module": "Supply Chain Improvement and Best Practices", "topic": "Measure, Analyze, and Improve the Supply Chain"}, {"term": "ASCM SCOR Digital Standard (SCOR DS)", "fr": "Le ASCM SCOR Digital Standard (SCOR DS) est l'évolution numérique du modèle SCOR traditionnel, développée et approuvée par l'ASCM. Ce standard intègre les processus numériques, les flux de données, les technologies émergentes (IA, IoT, automatisation) et les nouvelles pratiques de collaboration numérique dans un cadre de référence unifié pour la gestion de la supply chain du 21e siècle. Il couvre sept domaines : Orchestrate, Plan, Source, Order, Transform, Fulfill et Return. (Source : ASCM SCOR DS — ascm.org)", "en": "The ASCM's digital evolution of the SCOR model, integrating digital processes, data flows, AI, IoT, and automation into a unified supply chain reference framework for the modern digital supply chain.", "exam": true, "module": "Supply Chain Transformation Overview", "topic": "Research Models, Frameworks, and Benchmarking Tools"}, {"term": "Supply chain maturity", "fr": "Le niveau de développement et de sophistication des capacités, processus, technologies et pratiques d'une chaîne d'approvisionnement. Les modèles de maturité de la supply chain évaluent plusieurs dimensions — visibilité, intégration, agilité, résilience, durabilité et numérisation — sur une échelle progressive (généralement de 1 à 5). Ils permettent aux organisations d'identifier leur position actuelle, de comparer leurs performances aux meilleures pratiques et de planifier leur trajectoire de transformation. (Source : ASCM Supply Chain Maturity Model / Gartner)", "en": "The level of development and sophistication of a supply chain's capabilities, processes, technologies, and practices, assessed across dimensions such as visibility, integration, agility, resilience, and digitization.", "exam": true, "module": "Review of Supply Chain Transformation", "topic": "Reassess Supply Chain Transformation Maturity"}];
const MODULES = ["Supply Chain Transformation Management", "Supply Chain Planning and Execution", "Strategy", "Preparing for Supply Chain Transformation", "Supply", "Supply Chain Design", "Supply Chain Improvement and Best Practices", "Adopt a Change Management Plan", "Assess the Transformation", "Continuous Improvement and Quality Management and Technologies", "Supply Chain Transformation Overview", "Supply Chain Overview", "Detailed Schedules", "Inventory Planning", "Inventory Management", "Inventory Costs, Value, and Metrics", "Inventory Control", "Waste Hierarchy and Reverse Logistics", "Executing Supply Chain Transformation", "Order Quantity and Item Replenishment", "Plan Supply", "Distribution", "Review of Supply Chain Transformation", "Supply Chain Transformations", "Select Supply Chain Transformation Drivers"];

let filtered = [...ALL_CARDS];
let currentIdx = 0;
let isFlipped = false;
let showLang = 'fr';
let filterMode = 'all';
let filterModule = '';

// Populate module select
const sel = document.getElementById('moduleSelect');
MODULES.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m;
  opt.textContent = m;
  sel.appendChild(opt);
});

function setFilter(mode) {
  filterMode = mode;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip.c-' + mode).classList.add('active');
  applyFilters();
}

function setModule(mod) {
  filterModule = mod;
  applyFilters();
}

function applyFilters() {
  filtered = ALL_CARDS.filter(c => {
    if (filterMode === 'exam' && !c.exam) return false;
    if (filterModule && c.module !== filterModule) return false;
    return true;
  });
  currentIdx = 0;
  isFlipped = false;
  updateStats();
  renderCard();
}

function updateStats() {
  const total = filtered.length;
  const pos = total > 0 ? currentIdx + 1 : 0;
  const examCount = filtered.filter(c=>c.exam).length;
  document.getElementById('statsText').innerHTML =
    `<strong>${total}</strong> cartes affichées · <strong>${examCount}</strong> priorité examen`;
  const pct = total > 0 ? ((currentIdx+1)/total*100).toFixed(0) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function doShuffle() {
  shuffle(filtered);
  currentIdx = 0;
  isFlipped = false;
  renderCard();
}

function nav(dir) {
  isFlipped = false;
  currentIdx = Math.max(0, Math.min(filtered.length-1, currentIdx + dir));
  renderCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('theCard').classList.toggle('flipped', isFlipped);
}

function setLang(lang) {
  showLang = lang;
  const card = filtered[currentIdx];
  if (!card) return;
  document.getElementById('defText').textContent = lang === 'fr' ? card.fr : (card.en || card.fr);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}

function renderCard() {
  const area = document.getElementById('cardArea');
  updateStats();
  if (filtered.length === 0) {
    area.innerHTML = '<div class="empty">Aucune carte pour ce filtre.<br>Essayez un autre module ou retirez le filtre examen.</div>';
    return;
  }
  const card = filtered[currentIdx];
  const pos  = currentIdx + 1;
  const tot  = filtered.length;
  const examBadge = card.exam ? '<span class="badge exam">★ Examen</span>' : '';
  const modBadge  = `<span class="badge module" title="${card.module}">${card.module}</span>`;

  area.innerHTML = `
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="theCard">
        <div class="face front">
          <div>
            <div class="face-label">Terme — Cliquer pour révéler</div>
            <div class="term-text">${escHtml(card.term)}</div>
          </div>
          <div>
            <div class="card-meta">${examBadge}${modBadge}</div>
            <div class="flip-hint">Cliquer pour voir la définition ↓</div>
          </div>
        </div>
        <div class="face back">
          <div>
            <div class="face-label">Définition</div>
            <div class="lang-toggle">
              <button class="lang-btn active" data-lang="fr" onclick="event.stopPropagation();setLang('fr')">🇫🇷 Français</button>
              <button class="lang-btn" data-lang="en" onclick="event.stopPropagation();setLang('en')">🇬🇧 English</button>
            </div>
            <div class="def-text" id="defText">${escHtml(showLang==='fr' ? card.fr : (card.en||card.fr))}</div>
          </div>
          <div class="card-meta">${examBadge}${modBadge}</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="nav(-1)" ${pos<=1?'disabled':''}>← Précédent</button>
      <div class="nav-center">
        <span class="nav-count">${pos} / ${tot}</span>
        <span class="nav-total">${card.topic||''}</span>
      </div>
      <button class="nav-btn" onclick="nav(1)" ${pos>=tot?'disabled':''}>Suivant →</button>
    </div>
    <button class="shuffle-btn" onclick="doShuffle()">🔀 Mélanger les cartes</button>
  `;

  // Keyboard nav
  document.onkeydown = function(e) {
    if(e.key==='ArrowRight'||e.key==='ArrowDown') nav(1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') nav(-1);
    if(e.key===' '||e.key==='Enter') {e.preventDefault(); flipCard();}
  };
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
applyFilters();
</script>
</body>
</html>
